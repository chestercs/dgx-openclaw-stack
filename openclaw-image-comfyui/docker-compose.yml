# =====================================================================
# Image generation MCP bridge for the dgx-openclaw-stack.
#
# This compose file is INTENTIONALLY separate from the main stack
# `docker-compose.yml` at the repo root — image generation is a
# satellite feature wired in via MCP, not part of the always-on default
# profile. Cross-compose join is handled by the `external: true`
# network reference at the bottom: this service attaches to the main
# stack's bridge network so the OpenClaw gateway can dial it as
# `http://openclaw-image-comfyui:9095/mcp` over bridge DNS.
#
# Activation:
#   1. Make sure the main stack is up at least once (the bridge network
#      is created lazily by the main `docker compose up`).
#   2. Set IMAGE_GEN_API_TOKEN in the main .env (bootstrap.sh prompt 3e
#      handles this, or `./rotate-secrets.sh IMAGE_GEN_API_TOKEN`).
#   3. Build + start:
#        docker compose -f openclaw-image-comfyui/docker-compose.yml \
#                       --env-file ../.env --profile image-gen \
#                       up -d --build
#   4. Re-run the patcher so the gateway picks up `mcp.servers.comfyui_image`:
#        docker compose -f docker-compose.yml up -d --force-recreate \
#                       openclaw-config-init openclaw-gateway openclaw-cli
#
# The bridge reaches the operator's existing ComfyUI install via
# host-gateway (`COMFYUI_URL=http://host.docker.internal:13036` by
# default). It never owns a GPU itself — heavy lifting happens inside
# the user's separate ComfyUI compose project.
# =====================================================================

services:
  openclaw-image-comfyui:
    build:
      context: ./server
    image: openclaw-image-comfyui:0.12.2
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-image-comfyui
    hostname: openclaw-image-comfyui
    # `image-gen` profile gates this service so an absent --profile flag
    # leaves it parked. Mirrors the python-sandbox / hu-tts / browser opt-in
    # patterns; the operator must opt in explicitly.
    profiles: ["image-gen"]
    restart: unless-stopped
    init: true
    user: "1000:1000"
    ports:
      # Loopback-only by default (same posture as TTS/STT/sandbox).
      # Flip to 0.0.0.0 only if you have a reason — the Bearer token is
      # the only auth surface and a leaked token is still a leaked token.
      - "${IMAGE_GEN_BIND:-127.0.0.1}:${IMAGE_GEN_PORT:-9095}:9095"
    extra_hosts:
      # Reach the user's ComfyUI install (running in a separate compose,
      # port-published on the host) from inside this bridge container.
      # `host-gateway` works on Linux 20.10+; the variable resolves to
      # the docker bridge's host IP at container start.
      - "host.docker.internal:host-gateway"
    environment:
      # Empty default so `docker compose ... config` works pre-onboarding;
      # the bridge's app.py raises a RuntimeError at startup if it's still
      # empty when uvicorn launches (auth-required by design).
      IMAGE_GEN_API_TOKEN: ${IMAGE_GEN_API_TOKEN:-}
      COMFYUI_URL: ${COMFYUI_URL:-http://host.docker.internal:13036}
      # Browser-reachable URL — used in the `display_markdown` field of
      # the generate response so the agent can paste a working image
      # markdown into its chat reply. host.docker.internal does NOT
      # resolve from the operator's browser; set this to the host LAN IP
      # (or Cloudflare-tunnel-mapped subdomain) for chat-side rendering
      # to work. Defaults to COMFYUI_URL — set explicitly for chat use.
      COMFYUI_EXTERNAL_URL: ${COMFYUI_EXTERNAL_URL:-${COMFYUI_URL:-http://host.docker.internal:13036}}
      # When set, the bridge appends `?token=<value>` to the URL it embeds in
      # `display_markdown`. Pair with a reverse-proxy token-validation block
      # (NGINX `if ($arg_token != "...")`) and drop the Basic auth on that
      # proxy host — the URL-param form works on direct nav AND on
      # cross-origin <img> tags (Basic auth headers don't survive cross-origin
      # image fetches). See bridge README for the exact NGINX recipe.
      COMFYUI_VIEW_TOKEN: ${COMFYUI_VIEW_TOKEN:-}
      IMAGE_GEN_TIMEOUT_S: ${IMAGE_GEN_TIMEOUT_S:-600}
      IMAGE_GEN_MAX_CONCURRENCY: ${IMAGE_GEN_MAX_CONCURRENCY:-1}
      IMAGE_GEN_MAX_OUTPUT_BYTES: ${IMAGE_GEN_MAX_OUTPUT_BYTES:-52428800}
      IMAGE_GEN_POLL_INTERVAL_S: ${IMAGE_GEN_POLL_INTERVAL_S:-0.5}
      IMAGE_GEN_POLL_BACKOFF_MAX_S: ${IMAGE_GEN_POLL_BACKOFF_MAX_S:-2.0}
      # Path A (chat-side inline image render via [embed] shortcode):
      # set to /canvas to opt in. Pair with the volume mount below
      # (currently commented — uncomment to activate). See
      # docs/reference/image-comfyui-bridge.md "Path A" for the SSH probe
      # the operator should run before opting in. Default empty =
      # legacy display_markdown emission (cross-origin URL only).
      IMAGE_GEN_CANVAS_DIR: ${IMAGE_GEN_CANVAS_DIR:-}
      # Sensible-defaults — let conversational requests like
      # "@ImbulClaw generálj egy zsiráfot" succeed without specifying
      # workflow/checkpoint. When set, the bridge fills missing args.
      # Explicit caller args still win. See .env.example for guidance.
      IMAGE_GEN_DEFAULT_WORKFLOW: ${IMAGE_GEN_DEFAULT_WORKFLOW:-}
      IMAGE_GEN_DEFAULT_CHECKPOINT: ${IMAGE_GEN_DEFAULT_CHECKPOINT:-}
      # LTX-Video 2.3 (v0.12.0+) defaults — only consulted by the
      # generate_video tool. Length / fps / audio enabled apply when
      # the caller doesn't override per-call. Duration cap prevents
      # an agent from asking for a 60-second render that blows past
      # Discord's auto-embed envelope and the per-tool timeout.
      LTX_VIDEO_DEFAULT_LENGTH_FRAMES: ${LTX_VIDEO_DEFAULT_LENGTH_FRAMES:-97}
      LTX_VIDEO_DEFAULT_FPS: ${LTX_VIDEO_DEFAULT_FPS:-24}
      LTX_VIDEO_DEFAULT_AUDIO: ${LTX_VIDEO_DEFAULT_AUDIO:-on}
      LTX_VIDEO_MAX_DURATION_S: ${LTX_VIDEO_MAX_DURATION_S:-10}
      # v0.12.1+ — pre-warm ComfyUI's VRAM cache at bridge startup so
      # the first user render doesn't hit a 130s cold-cache load and
      # blow past OpenClaw's MCP 60s request timeout (the SDK default;
      # OpenClaw's runtime doesn't pass resetTimeoutOnProgress=true so
      # progress notifications alone wouldn't fix it). Background task,
      # doesn't block startup. See app.py _ltx_warmup_render() doc.
      LTX_VIDEO_WARMUP_ON_STARTUP: ${LTX_VIDEO_WARMUP_ON_STARTUP:-true}
      LTX_VIDEO_WARMUP_WORKFLOW: ${LTX_VIDEO_WARMUP_WORKFLOW:-ltx-2.3-t2v}
      # Optional periodic re-warm. Default off — empirically ComfyUI
      # 0.21.1 doesn't auto-offload, so once warm stays warm. Set to
      # e.g. 1800 (30 min) if you observe offloads on your install.
      LTX_VIDEO_KEEPALIVE_S: ${LTX_VIDEO_KEEPALIVE_S:-0}
      # v0.12.2+ — also pre-warm the IMAGE-gen default workflow at
      # startup. Same cold-cache MCP timeout pattern hits image-gen
      # when the operator's IMAGE_GEN_DEFAULT_WORKFLOW (FLUX-Krea-dev
      # / SDXL / etc) hasn't been loaded yet: ComfyUI takes 60-90s to
      # load the diffusion + clip + vae weights, MCP times out at
      # 60s, render succeeds silently on disk while Discord sees the
      # error. Default on. Skips cleanly if IMAGE_GEN_DEFAULT_WORKFLOW
      # is unset or points at a missing workflow.
      IMAGE_GEN_WARMUP_ON_STARTUP: ${IMAGE_GEN_WARMUP_ON_STARTUP:-true}
    volumes:
      # workflows/ is COPYed into the image AND bind-mounted ro so
      # operators can drop new templates without rebuilding. The bridge
      # parses the directory at startup; restart the container to pick
      # up new files.
      - ./server/workflows:/app/workflows:ro
      # Path A bind-mount — uncomment to activate inline chat rendering.
      # The host path must be the gateway's canvas dir (typically
      # ${OPENCLAW_CONFIG_DIR}/canvas). The bridge runs as 1000:1000
      # which matches the gateway's UID — the gateway's canvas-documents
      # lifecycle and the bridge's PNG drops coexist without permission
      # issues. Don't activate without first running the SSH probe in
      # docs/reference/image-comfyui-bridge.md → "Path A" (verify the
      # canvas dir host path on your deploy + that [embed] accepts .png
      # MIME on your openclaw version).
      # - ${OPENCLAW_CONFIG_DIR}/canvas:/canvas:rw
    cap_drop: [ALL]
    security_opt:
      - "no-new-privileges:true"
    # Bumped 1024m → 1536m in v0.12.0 for the video extension. ffmpeg
    # was added to the image (~50 MB resident), and mp4 byte buffers
    # in the canvas-wrapper write path are larger than PNG. The bridge
    # still has no GPU and never holds model weights in RAM — heavy
    # lifting stays inside ComfyUI on the host.
    mem_limit: 1536m
    cpus: 1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:9095/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────────
# Cross-compose network join: attach to the main stack's bridge so the
# OpenClaw gateway can resolve `openclaw-image-comfyui:9095` over
# bridge DNS. The main stack must be `up` at least once before this
# compose can start (the network is created on demand by the main
# `docker compose up`).
#
# `name:` follows the docker convention `<COMPOSE_PROJECT_NAME>_default`.
# Override `COMPOSE_PROJECT_NAME` in your .env if your main stack uses
# a non-default project name.
# ─────────────────────────────────────────────────────────────────────
networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-dgx-openclaw}_default
    external: true
