# DGX OpenClaw Stack — local LLM + RAG + agent stack for NVIDIA DGX Spark and
# ASUS GB10 (Grace-Blackwell, 128 GB unified memory, NVFP4 native).
#
# Quick reference:
#   - First-time setup: `./bootstrap.sh` creates .env, host dirs, rotates secrets
#   - Day-to-day:       `docker compose up -d` / `docker compose logs -f`
#   - Step-by-step:     SETUP.md (audience: end-users + sysadmins)
#   - Design rationale: docs/ARCHITECTURE.md (audience: contributors + curious)
#
# Services and host ports:
#   vllm-llm             — Gemma 4 31B IT NVFP4         port 8004 (internal)
#   vllm-embedding       — BAAI/bge-m3 1024-dim         port 8005 (internal)
#   searxng              — privacy meta-search          port 8080 (internal)
#   openclaw-tts-fish    — Fish Audio S2 Pro (multilingual) port 8091 (loopback)
#   openclaw-stt-whisper — faster-whisper turbo CT2     port 8093 (loopback)
#   openclaw-gateway     — agent gateway + WebSocket    port 18789 (exposed)
#   openclaw-config-init — idempotent config patcher    one-shot
#   openclaw-cli         — always-up exec target        shares gateway namespace
#
# Networking model:
#   - Sibling containers reach each other by compose service name (vllm-llm:8004,
#     vllm-embedding:8005, searxng:8080, openclaw-tts-fish:8080) on the default
#     compose bridge network. No host port publishing is required for inter-
#     service traffic.
#   - vLLM ports are intentionally NOT published on the host — uncomment the
#     `127.0.0.1:` bindings only if you need direct debug access, and keep the
#     bind on loopback (an unauthenticated 0.0.0.0 vLLM endpoint is an open door).
#   - TTS and STT ports default to loopback (127.0.0.1) for the same reason;
#     expose on the LAN by setting TTS_*_BIND / STT_WHISPER_BIND=0.0.0.0 in
#     .env (all three surfaces are Bearer-token-protected).
#   - Only the gateway (18789) is exposed on 0.0.0.0 by default. Put a reverse
#     proxy (Nginx Proxy Manager, Caddy, Cloudflare tunnel) in front for public
#     access over wss://.

volumes:
  # Shared HuggingFace cache volume — both vLLM services pull model weights
  # into the same cache directory so we never download a given model twice.
  # Bound to ${VLLM_HF_CACHE_DIR} on the host to survive `docker compose down`
  # without re-downloading ~16 GB of Gemma + ~1 GB of bge-m3 weights.
  #
  # Why the name is env-driven (VLLM_HF_CACHE_VOLUME_NAME):
  # If you run sibling LLM compose stacks on the same host (e.g. an alternate
  # quantization for A/B testing, or a separate embedding service), you can
  # point them all at the same host path via VLLM_HF_CACHE_DIR — Docker will
  # bind-mount the same directory regardless of the volume label. Setting a
  # shared VLLM_HF_CACHE_VOLUME_NAME also makes the volume show up under one
  # consistent label in `docker volume ls`. Default keeps the dgx-openclaw-
  # prefix so multiple unrelated stacks on the same host don't collide.
  hf-cache:
    name: ${VLLM_HF_CACHE_VOLUME_NAME:-dgx-openclaw-hf-cache}
    driver: local
    driver_opts:
      type: none
      device: ${VLLM_HF_CACHE_DIR}
      o: bind
  # Fish Audio S2 Pro HF cache for openclaw-tts-fish. The ~11 GB s2-pro weights
  # are baked into the image at build time; this volume is a safety net for any
  # runtime HF downloads SGLang-Omni does on first synth (tokenizer assets,
  # codec cache, etc.).
  tts-fish-hf-cache:
    name: dgx-openclaw-tts-fish-hf-cache
  # User-overridable reference voice directory for openclaw-tts-fish. Drop
  # <name>.wav + <name>.txt files in here to add custom voices the service
  # can clone (no restart required — the shim resolves voice → file pair at
  # request time). Ships with default_en + default_hu (LibriVox public domain)
  # seeded from the image's /app/voices_seed/ on first start.
  tts-fish-voices:
    name: dgx-openclaw-tts-fish-voices
  # faster-whisper weight cache for openclaw-stt-whisper. Holds the ~3 GB
  # large-v3 CT2-quantized weights (or ~1.6 GB turbo) so `docker compose down`
  # doesn't re-download them on the next boot. No host bind — faster-whisper
  # manages the HuggingFace cache layout inside the volume itself.
  stt-whisper-hf-cache:
    name: dgx-openclaw-stt-whisper-hf-cache
  # Per-profile Chromium user-data-dirs for openclaw-browser (only used when
  # the `browser` Compose profile is active). One subdirectory per onboarded
  # credential — cookies, localStorage, IndexedDB persist across container
  # restarts so 1x manual login holds for the full session-cookie lifetime
  # (~14d GitHub, ~30d Notion, etc.). Treat backups of this volume as
  # secret-equivalent; the contents include live session tokens.
  browser-storage:
    name: dgx-openclaw-browser-storage
  # Failure screenshots + HAR files for openclaw-browser. Diagnostic-only;
  # 100 MB cap, oldest-file sweeper trims hourly. Safe to delete at any time.
  browser-diagnostics:
    name: dgx-openclaw-browser-diagnostics

services:
  ######################
  ## vLLM — Gemma 4 26B-A4B MoE (Instruction Tuned), NVFP4 quantization (DEFAULT)
  #
  #  Model:  nvidia/Gemma-4-26B-A4B-NVFP4
  #    - 25.2B total / 3.8B active params per token (128 experts, top-8 routing)
  #    - NVFP4 quantization (~16.5 GB weights), nvfp4_experts_only modelopt recipe
  #    - 256K context window, multimodal (text + image, vision tower included)
  #    - Apache 2.0 license, gated on HF (license-acceptance via HUGGING_FACE_HUB_TOKEN)
  #    - GB10/Blackwell (sm_120/sm_121) compatible via Marlin MoE backend
  #
  #  GB10 benchmark (vLLM, NVFP4 MoE, ai-muninn 2026-04):
  #    - Decode: ~52 tok/s (1 user) — ~7.5x faster than the 31B dense it replaces.
  #    - 16.5 GB model + ~3.3 GB FP8 KV per 256K seq → 2 users × 256K fit
  #      comfortably at LLM_GPU_MEM_UTIL=0.50 (~64 GB cap, ~47 GB KV available).
  #    - 273 GB/s LPDDR5x bandwidth bottleneck unchanged, but only ~3.8B active
  #      weights are read per decoded token — that's the speedup.
  #
  #  The dense 31B variant runs ALONGSIDE this service as `vllm-llm-dense`
  #  on port 8005 — separate hostname, separate OpenClaw provider entry
  #  (vllm-dense). Both backends respond simultaneously; the user picks
  #  the model from the OpenClaw UI dropdown.
  #
  #  Image: vllm/vllm-openai:gemma4-cu130 — official vLLM day-1 Gemma 4 image,
  #  wrapped in our ./vllm-llm/Dockerfile with a 1-line tool-call-parser regex
  #  patch (see `vllm-llm.image:` comment below). The base image, CUDA 13,
  #  Transformers 5.5+, and the gemma4 + NVFP4 (modelopt) kernels apply
  #  identically to MoE and dense.
  #
  #  Key flags:
  #    --quantization modelopt         : activates NVIDIA Model Optimizer NVFP4 GEMM.
  #    --moe-backend marlin            : Blackwell SM121 (GB10) MUST use Marlin —
  #                                      CUTLASS produces NaN scale factors on
  #                                      the fused 3D expert tensor format that
  #                                      Gemma 4 MoE ships. Marlin decompresses
  #                                      FP4→BF16 at inference time, slightly
  #                                      slower per-expert but functionally
  #                                      correct. Switch to `cutlass` only on
  #                                      H100/B200 if a vLLM upgrade fixes SM121.
  #                                      Override via LLM_MOE_BACKEND in .env.
  #    --gpu-memory-utilization 0.50   : MoE has a smaller effective working set
  #                                      than dense (16.5 GB model + ~6.6 GB KV
  #                                      for 2 × 256K), so 0.50 is the new safe
  #                                      default. Raise to 0.85 (the verified
  #                                      52 tok/s tuning point) if the embedding
  #                                      stack is parked or you want headroom
  #                                      for prefix-caching across many sessions.
  #    --kv-cache-dtype fp8            : halves KV cache, lets continuous batching
  #                                      stretch across more concurrent seqs.
  #    --max-model-len 262144          : Gemma 4 architecture maximum (256K).
  #    --max-num-seqs 2                : 2 concurrent users via continuous batching,
  #                                      each holding 256K context preempt-free at
  #                                      LLM_GPU_MEM_UTIL=0.50.
  #    --max-num-batched-tokens 8192   : chunked prefill batch size.
  #    --enable-prefix-caching         : system prompts de-duplicated across turns.
  #    --enable-chunked-prefill        : long prompts don't block decode of others.
  #    --reasoning-parser gemma4       : <|channel>thought reasoning mode.
  #    --tool-call-parser gemma4       : native tool calls → OpenAI tool_calls JSON.
  #    --enable-auto-tool-choice       : model decides when to call tools.
  #    --chat-template .../gemma4.jinja: vLLM repo tool-calling template (shipped in
  #                                      ./templates/ because the gemma4-cu130 image
  #                                      doesn't include it). Without this template
  #                                      the model emits raw "call:name{args}" text
  #                                      in the content field instead of populating
  #                                      the OpenAI tool_calls array — OpenClaw would
  #                                      then not recognize any tool call.
  #    --limit-mm-per-prompt ...       : multimodal budget (4 images / request, no audio).
  #                                      vLLM 0.11+ expects JSON (the older key=value
  #                                      syntax fails with "cannot be converted to json.loads").
  #    --mm-processor-kwargs ...       : vision token budget per image (280 is the
  #                                      sweet spot ≈ 512×512; raise to 560/1120 for
  #                                      OCR, charts, handwriting at the cost of KV).
  #    ${LLM_ENFORCE_EAGER:+--enforce-eager} : CUDA graphs ON by default (LLM_ENFORCE_EAGER unset).
  #                                      Verified 2026-05-08 on GB10 + Marlin SM121 backend +
  #                                      MoE 26B-A4B: ~10% single-stream gain (22.5 → 24.9 tok/s)
  #                                      and ~30% 4-paralel-aggregate gain (86 → 112 tok/s) over
  #                                      eager mode, no hangs across 5K-200K context sweep.
  #                                      The pre-2026 "GB10 unified-mem CUDA-graphs hangs" gotcha
  #                                      appears resolved in vLLM 0.19+. Set LLM_ENFORCE_EAGER=1
  #                                      in .env to force eager (back-compat / rollback path).
  ######################
  vllm-llm:
    # Custom image with a 1-line patch to the Gemma4 tool-call parser regex
    # (gemma4_tool_parser.py:338) so it accepts colon namespaces in tool
    # names. Upstream regex `[\w\-\.]` rejects colons; the OpenClaw Discord
    # plugin uses `discord:add_reaction` (colon-namespaced), unlike every
    # other plugin which uses `__`. Without this patch, Gemma 4 NVFP4 emits
    # `<|tool_call>call:discord:add_reaction{...}<tool_call|>` correctly, but
    # vLLM's parser drops it (regex stops at the second colon) and the
    # literal envelope leaks into Discord chat as garbage text. Adding ':'
    # to the char class fixes it transparently.
    #
    # Build context (./vllm-llm/) ships a 1-file Dockerfile + patch_parser.py.
    # `image:` names the resulting local layer so `docker compose build`
    # caches and `up -d` always uses the patched image. To revert to the
    # unpatched upstream image (e.g. when this stack switches to a non-Gemma
    # backend whose parser already handles colons): comment out the `build:`
    # line and `docker compose pull vllm-llm` will fetch the upstream tag.
    build:
      context: ./vllm-llm
      args:
        VLLM_BASE_IMAGE: vllm/vllm-openai:gemma4-cu130
    image: ${CONTAINER_NAME_PREFIX:-dgx-openclaw-}vllm-llm:gemma4-cu130-colonfix
    container_name: ${CONTAINER_NAME_PREFIX:-}vllm-llm
    hostname: vllm-llm
    restart: unless-stopped
    ipc: host
    tty: true
    # vLLM OpenAI-compatible API published to the host. `LLM_BIND` controls
    # which interface the host-side mapping listens on:
    #   127.0.0.1 (default) — loopback only; in-host curl + sibling containers
    #   0.0.0.0             — LAN-exposed (requires VLLM_API_KEY for auth);
    #                         opt-in for multi-host setups, direct workstation
    #                         clients, etc. The Bearer-token auth is the only
    #                         barrier to a leaked endpoint, so don't set this
    #                         if VLLM_API_KEY isn't strong / rotated.
    # Sibling containers always reach via compose DNS `vllm-llm:8004`;
    # publishing is purely for external/LAN access.
    ports:
      - "${LLM_BIND:-127.0.0.1}:8004:8004"
    # MoE default. The 26B-A4B variant routes only ~3.8B params per token via
    # 128 fine-grained experts (top-8) — ~7.5× faster decode than the 31B dense
    # NVFP4 it replaces (52 tok/s vs 6.9 tok/s on GB10), 16.5 GB model footprint
    # leaves plenty of room for 2 × 256K KV at LLM_GPU_MEM_UTIL=0.50.
    # On Blackwell SM121 (GB10) `--moe-backend marlin` is mandatory: CUTLASS
    # produces NaN scale factors on the fused 3D expert tensor format. Marlin
    # decompresses FP4 → BF16 at inference time (slightly slower per-expert,
    # functionally correct). The dense 31B alternative runs concurrently in
    # the `vllm-llm-dense` block below on its own port (8005) and hostname
    # (vllm-llm-dense), no profile-mutex, both reachable simultaneously.
    # `LLM_MODEL_ID` lets an operator try a different MoE checkpoint (e.g. a
    # community NVFP4 quantization that ships its own loader patch — see
    # TROUBLESHOOTING.md "MoE model load KeyError"). Default = the NVIDIA
    # reference. The patcher auto-registers a catalog entry for any override
    # id so the OpenClaw UI lists it; default-model selection happens in the
    # UI / per-agent settings (the schema doesn't expose a writable
    # agents.defaults.llm.model field for the patcher to set).
    command: >
      --model ${LLM_MODEL_ID:-nvidia/Gemma-4-26B-A4B-NVFP4}
      --host 0.0.0.0
      --port 8004
      --api-key ${VLLM_API_KEY:-}
      --quantization ${LLM_QUANTIZATION:-modelopt}
      --moe-backend ${LLM_MOE_BACKEND:-marlin}
      --gpu-memory-utilization ${LLM_GPU_MEM_UTIL:-0.50}
      -tp 1
      --load-format safetensors
      --kv-cache-dtype fp8
      --max-model-len ${LLM_MAX_MODEL_LEN:-262144}
      --max-num-seqs ${LLM_MAX_NUM_SEQS:-2}
      --max-num-batched-tokens 8192
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --chat-template /templates/tool_chat_template_gemma4.jinja
      --enable-auto-tool-choice
      --limit-mm-per-prompt '{"image":${LLM_LIMIT_MM_IMAGES:-2},"audio":0}'
      --mm-processor-kwargs '{"max_soft_tokens":280}'
      --enable-prefix-caching
      --enable-chunked-prefill
      ${LLM_ENFORCE_EAGER:+--enforce-eager}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_LOGGING_LEVEL: ${VLLM_LOGGING_LEVEL:-INFO}
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./templates:/templates:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "150m"
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      # vLLM /health returns 200 when the model is loaded and ready.
      # Cold-start can take 60-120s (safetensors load + NVFP4 kernel JIT).
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; urllib.request.urlopen(\"http://127.0.0.1:8004/health\", timeout=2); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  ######################
  ## vLLM — Gemma 4 31B IT NVFP4 dense (OPT-IN ALTERNATIVE, profile: dense)
  #
  #  The dense 31B variant the stack used through v0.x. Runs ALONGSIDE the MoE
  #  by default — its own port (8005) and hostname (vllm-llm-dense), separate
  #  OpenClaw provider entry (vllm-dense). Both are reachable simultaneously,
  #  so an operator can A/B compare on the fly via the UI's model dropdown.
  #
  #  Tuning intent: single-user, 256K context, low-RAM. ~6.9 tok/s decode on
  #  GB10 (slower than MoE but full architecture context preserved). Default
  #  LLM_GPU_MEM_UTIL_DENSE=0.30 matches the MoE side, leaving ~26 GB free
  #  with both backends up (17 GB MoE + 17 GB dense + 14 GB MoE-KV + ~21 GB
  #  dense-KV + 25 GB everything else ≈ 102 GB / 128 GB on the host).
  #
  #  Pick the model in the OpenClaw UI dropdown; both providers are registered
  #  in the catalog by the patcher (vllm/<MoE> + vllm-dense/<dense>).
  ######################
  vllm-llm-dense:
    build:
      context: ./vllm-llm
      args:
        VLLM_BASE_IMAGE: vllm/vllm-openai:gemma4-cu130
    image: ${CONTAINER_NAME_PREFIX:-dgx-openclaw-}vllm-llm:gemma4-cu130-colonfix
    container_name: ${CONTAINER_NAME_PREFIX:-}vllm-llm-dense
    hostname: vllm-llm-dense
    restart: unless-stopped
    ipc: host
    tty: true
    # Same LLM_BIND env-knob as the MoE service. Different host port (8005).
    ports:
      - "${LLM_BIND:-127.0.0.1}:8005:8005"
    command: >
      --model nvidia/Gemma-4-31B-IT-NVFP4
      --host 0.0.0.0
      --port 8005
      --api-key ${VLLM_API_KEY:-}
      --quantization modelopt
      --gpu-memory-utilization ${LLM_GPU_MEM_UTIL_DENSE:-0.40}
      -tp 1
      --load-format safetensors
      --kv-cache-dtype fp8
      --max-model-len ${LLM_MAX_MODEL_LEN_DENSE:-262144}
      --max-num-seqs ${LLM_MAX_NUM_SEQS_DENSE:-1}
      --max-num-batched-tokens 8192
      --reasoning-parser gemma4
      --tool-call-parser gemma4
      --chat-template /templates/tool_chat_template_gemma4.jinja
      --enable-auto-tool-choice
      --limit-mm-per-prompt '{"image":${LLM_LIMIT_MM_IMAGES:-2},"audio":0}'
      --mm-processor-kwargs '{"max_soft_tokens":280}'
      --enable-prefix-caching
      --enable-chunked-prefill
      --enforce-eager
    environment:
      # Dense hardcodes `--enforce-eager` (CUDA graphs OFF). The dense weights
      # take ~31 GB in unified memory; with CUDA graphs ON the activations +
      # graph capture overhead consumes another ~6 GB, leaving the 0.30 util
      # budget with effectively zero KV pool. Eager mode here is the
      # low-RAM single-user trade-off: ~5% per-token slower but fits
      # 128K context inside ~7 GB KV. The MoE service runs CUDA graphs ON
      # via the LLM_ENFORCE_EAGER env knob — only the dense is forced eager.
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_LOGGING_LEVEL: ${VLLM_LOGGING_LEVEL:-INFO}
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./templates:/templates:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "150m"
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; urllib.request.urlopen(\"http://127.0.0.1:8005/health\", timeout=2); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  ######################
  ## vLLM — BAAI/bge-m3 multilingual dense embeddings
  #
  #  Model:  BAAI/bge-m3 (567M params, BF16 safetensors, ~1.1 GB)
  #    - Multilingual (100+ languages), trained on MIRACL / Mr.TyDi
  #    - Dense + sparse (lexical) + ColBERT multi-vector outputs
  #      (vLLM's OpenAI-compatible endpoint currently returns the dense output;
  #       that's sufficient for OpenClaw memorySearch)
  #    - 8K native context — plenty for chapter-length RAG chunks
  #    - XLMRoberta encoder — natively supported by vLLM `--runner pooling`
  #    - Cross-lingual retrieval: EN↔HU cosine ≈ 0.88 (production-validated)
  #
  #  Why bge-m3 instead of a larger embedding model:
  #    - MIRACL / Mr.TyDi parity with Qwen3-Embedding-8B at 1/5 the footprint
  #    - Frees ~5-8 GB unified memory for the LLM KV cache
  #    - Dense-only output is enough for QMD hybrid retrieval in OpenClaw
  #
  #  API: http://vllm-embedding:8005/v1/embeddings (OpenAI-compatible)
  #     {
  #       "model": "BAAI/bge-m3",
  #       "input": "..."
  #     }
  #     → 1024-dim dense vector
  ######################
  vllm-embedding:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: ${CONTAINER_NAME_PREFIX:-}vllm-embedding
    hostname: vllm-embedding
    restart: unless-stopped
    ipc: host
    tty: true
    # Uncomment for host debug access:
    # ports:
    #   - "127.0.0.1:8005:8005"
    command: >
      BAAI/bge-m3
      --host 0.0.0.0
      --port 8005
      --runner pooling
      --gpu-memory-utilization ${EMBED_GPU_MEM_UTIL:-0.03}
      -tp 1
      --max-model-len ${EMBED_MAX_MODEL_LEN:-8192}
      --max-num-seqs ${EMBED_MAX_NUM_SEQS:-2}
      --enforce-eager
      --served-model-name BAAI/bge-m3
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      HF_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      VLLM_LOGGING_LEVEL: ${VLLM_LOGGING_LEVEL:-INFO}
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "150m"
    ulimits:
      memlock: -1
      stack: 67108864
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; urllib.request.urlopen(\"http://127.0.0.1:8005/health\", timeout=2); sys.exit(0)' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  ######################
  ## SearxNG — self-hosted privacy-first meta-search backend for the OpenClaw
  ## gateway's native `webSearch` provider.
  #
  #  Upstream: https://github.com/searxng/searxng
  #  OpenClaw provider docs: https://docs.openclaw.ai/tools/searxng-search
  #
  #  Why this service: OpenClaw ships a bundled `searxng` plugin that calls a
  #  SearxNG instance over HTTP JSON (/search?...&format=json). Running our own
  #  SearxNG locally means search queries never hit a commercial search API
  #  (no Tavily / Brave Search API / Serper / etc.). With the strict engine set
  #  in settings/settings.yml, queries also never reach Google, Bing, Yandex,
  #  Yahoo, or Baidu — only privacy-respecting meta-engines (DuckDuckGo, Brave,
  #  Mojeek, Qwant, Startpage) and public-knowledge sources (Wikipedia family,
  #  Reddit, GitHub, arXiv).
  #
  #  Note: self-hosting SearxNG only hides the *client* — the query text still
  #  reaches whichever upstream engines you enable. The privacy win here is the
  #  strict engine whitelist, not just the container itself.
  #
  #  Networking: internal-only. No host port is published. The OpenClaw gateway
  #  and CLI reach it by compose DNS as `http://searxng:8080`. For debug from
  #  the host, temporarily uncomment the `127.0.0.1:8888:8080` binding below.
  #
  #  Resource footprint: CPU-only, ~50-100 MB RAM idle, short bursts while a
  #  query fans out to upstream engines. No GPU allocation — irrelevant against
  #  the LLM footprint.
  ######################
  searxng:
    image: searxng/searxng:latest
    container_name: ${CONTAINER_NAME_PREFIX:-}searxng
    hostname: searxng
    restart: unless-stopped
    # Uncomment for host-side debug access:
    # ports:
    #   - "127.0.0.1:8888:8080"
    environment:
      # Self-reference URL used by SearxNG's OG tags and /config endpoint.
      # Internal compose-DNS hostname is fine because this service is never
      # reached from outside the compose network.
      SEARXNG_BASE_URL: http://searxng:8080/
      # Cookie / CSRF signing key — generated by bootstrap.sh into .env.
      # SearxNG refuses to start if this stays at the upstream placeholder.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
      # Redundant belt-and-braces: settings.yml also sets limiter: false.
      SEARXNG_LIMITER: "false"
    volumes:
      - ./searxng/settings:/etc/searxng:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  ######################
  ## Fish Audio S2 Pro TTS — OpenAI-compatible /v1/audio/speech (multilingual,
  ## voice-cloning). Replaces the legacy 3-service Kokoro EN + F5-TTS HU +
  ## router pipeline with one container.
  #
  #  Model: fishaudio/s2-pro (Fish Audio Research License — non-commercial).
  #  ~11 GB weights (2 safetensors shards + codec.pth + tokenizer) baked into
  #  the image at build time. 80+ languages from one checkpoint, English and
  #  Hungarian both supported (HU is Tier 3 — voice cloning with a clean
  #  reference clip compensates).
  #
  #  Loader: SGLang-Omni (sgl-project/sglang-omni). The upstream Docker image
  #  `frankleeeee/sglang-omni:dev` is amd64-only, so we build a custom image
  #  on a CUDA 13 devel aarch64 base and let SGLang-Omni compile sgl-kernel
  #  from source against the cu130 torch wheels. First build is long
  #  (~15-30 min including model download); subsequent builds hit the layer
  #  cache. See ./openclaw-tts-fish/README.md for the full rationale.
  #
  #  Architecture: two processes inside one container. A FastAPI shim on
  #  :8080 handles Bearer auth (TTS_API_TOKEN) + voice→references mapping +
  #  optional leading-silence pad. SGLang-Omni runs as a child process on
  #  loopback :9090 and emits the native /v1/audio/speech response. The shim
  #  translates the OpenAI-style `voice` field into SGLang-Omni's
  #  `references[].audio_path` shape (voice cloning via mounted file paths,
  #  NOT inline base64).
  #
  #  Voice cloning workflow: drop <name>.wav + <name>.txt into
  #  tts-fish-voices. No restart required — the shim resolves the voice id
  #  to the file pair at request time.
  #    docker cp myclone.wav ${CONTAINER_NAME_PREFIX}openclaw-tts-fish:/app/voices/
  #    docker cp myclone.txt ${CONTAINER_NAME_PREFIX}openclaw-tts-fish:/app/voices/
  #
  #  Default voices shipped: default_en (LibriSpeech / LibriVox PD) and
  #  default_hu (Diana Majlinger / "Egri csillagok", LibriVox PD). Seeded
  #  from /app/voices_seed/ at first start without overwriting user voices.
  #
  #  License caveat: the s2-pro weights are Fish Audio Research License —
  #  research / non-commercial use only. Wrapper code in
  #  ./openclaw-tts-fish/server/ is MIT. Commercial deployments need either
  #  `business@fish.audio` or a swap to a different checkpoint via the
  #  FISH_REPO build arg.
  #
  #  Networking: internal-only by default — the gateway reaches this service
  #  by compose DNS as `http://openclaw-tts-fish:8080`. Host-side loopback
  #  publish below for debug. Bearer-auth: TTS_API_TOKEN.
  #
  #  Disable: set `profiles: ["never"]` on this service AND leave
  #  OPENCLAW_TTS_FISH_API_KEY empty in .env. Patcher step 11 is env-gated
  #  (skipped when the key is unset), so dropping the key cleanly opts out of
  #  the gateway wiring too.
  ######################
  openclaw-tts-fish:
    build:
      context: ./openclaw-tts-fish/server
      args:
        # Optional — pass through if the operator's HF account is rate-
        # limited or the model becomes gated. Public access works without it.
        HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    image: openclaw-tts-fish:0.1.0
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-tts-fish
    hostname: openclaw-tts-fish
    restart: unless-stopped
    # Host-side bind for debug access. Default 127.0.0.1 = loopback only.
    # Set TTS_FISH_BIND=0.0.0.0 in .env to expose on the LAN (Bearer-auth via
    # TTS_API_TOKEN). Sibling containers (gateway / CLI) always reach this
    # via bridge DNS regardless of this binding.
    ports:
      - "${TTS_FISH_BIND:-127.0.0.1}:${TTS_FISH_PORT:-8091}:8080"
    environment:
      # Bearer token gating every /v1/* request. Required — the shim refuses
      # to start without it (the s2-pro model is non-commercially licensed
      # and we don't want anonymous LAN clients on it).
      TTS_API_TOKEN: ${TTS_API_TOKEN:-}
      # Voice picked when the gateway doesn't override. Must match a file
      # pair in /app/voices/ (default_en + default_hu ship by default).
      TTS_FISH_DEFAULT_VOICE: ${TTS_FISH_DEFAULT_VOICE:-default_en}
      # cuda by default; set cpu for a slow CPU fallback (useful on a remote
      # vLLM deployment where this host has no GPU).
      TTS_FISH_DEVICE: ${TTS_FISH_DEVICE:-cuda}
      # Leading silence (ms) prepended to every WAV reply. Defends against
      # the Whisper STT onset clip ("Szia" -> "Zia"). 300 ms is empirically
      # fine for EN + HU. Set 0 to skip (brings back the onset clip on
      # short HU utterances).
      TTS_FISH_LEADING_SILENCE_MS: ${TTS_FISH_LEADING_SILENCE_MS:-300}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - tts-fish-voices:/app/voices
      - tts-fish-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # /healthz is always unauth (middleware exempts it by path). Cold start
      # is long — SGLang-Omni's child process can take several minutes to
      # load s2-pro weights + JIT-compile kernels on a fresh GPU. start_period
      # 180s buys a generous grace window before the container is marked
      # unhealthy and restarted.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "50m"

  ######################
  ## Whisper STT — faster-whisper turbo CT2, OpenAI-compatible speech-to-text.
  #
  #  Endpoints: POST /v1/audio/transcriptions, POST /v1/audio/translations,
  #             GET /v1/models, GET /health. Served by a ~150 LOC FastAPI
  #             wrapper on top of faster-whisper (CTranslate2 backend), built
  #             from `./openclaw-stt-whisper/server/` on a CUDA 13 base. MIT
  #             wrapper code + MIT Whisper weights.
  #
  #  Why self-built instead of `ghcr.io/speaches-ai/speaches`: the upstream
  #  image's published CUDA variant (12.6.3) ships a CTranslate2 that does
  #  NOT render tensor-core kernels for Blackwell sm_120 — every low-precision
  #  compute type (float16 / int8_float16 / int8_bfloat16) is rejected, and
  #  the float32 fallback runs on CUDA cores at real-time factor ~1× while
  #  also destabilizing numerically. A CUDA 13 base + cu130 PyTorch wheels +
  #  current faster-whisper is the proven GB10 path (matches the vllm-llm /
  #  openclaw-tts-fish wheel pattern). Swap `build:` back to `image:` if the
  #  speaches upstream ever publishes a Blackwell-tensor-core variant.
  #
  #  Model: deepdml/faster-whisper-large-v3-turbo-ct2 (MIT) by default,
  #  ~1.6 GB VRAM at compute_type=float16, ~8× faster than the vanilla
  #  large-v3 (4 decoder layers instead of 32). Autodetects language per
  #  request — no bilingual router needed (unlike TTS). Multilingual EN+HU
  #  works out of the box. Turbo is the right default for voice-chat latency
  #  (Fish Audio S2 Pro → LLM → STT roundtrip on Discord voice channels).
  #
  #  HU-finetune alternate: STT_WHISPER_MODEL=Trendency/whisper-large-v3-hu
  #  (Apache-2.0, ~11% CV WER, more robust on noisy / phone-grade HU audio
  #  per 2026-04-24 GB10 validation). Slower (~3 GB VRAM, full 32-layer
  #  decoder). Switch if Hungarian transcription accuracy on noisy mic input
  #  matters more than latency.
  #
  #  VRAM-tight fallback: STT_WHISPER_COMPUTE_TYPE=int8_float16 halves VRAM
  #  (~0.8 GB on turbo) at a 5-10% WER cost.
  #
  #  OpenClaw consumption (see patch-config.mjs step 14): wired via
  #  tools.media.audio.models[] pointing at this service. Used by voice-note
  #  upload in the Control UI chat (drop a wav/mp3 into the composer), the
  #  Discord voice-channel transcription, the VoiceCall CLI, and the Talk /
  #  Voicewake node pipelines. The Control UI realtime mic button is a
  #  separate path — OpenClaw hardwires speech.ts to the browser's native
  #  Web Speech API, which does NOT route through this service.
  #
  #  GB10 VRAM budget at LLM_GPU_MEM_UTIL=0.68:
  #    Gemma 4 NVFP4 ~96 GB + bge-m3 ~1.1 GB + Fish S2 Pro ~11 GB + Whisper
  #    turbo ~1.6 GB ≈ 110 GB used, ~3 GB headroom on the 113 GB effective
  #    shared pool. Drop ComfyUI / video workloads before heavy TTS+STT use.
  #
  #  Networking: internal-only by bridge DNS (`openclaw-stt-whisper:8080`).
  #  Host-side loopback publish below for debug. Bearer-auth: STT_API_TOKEN.
  #  Set STT_WHISPER_BIND=0.0.0.0 in .env to expose on the LAN (still token-
  #  protected). Sibling containers always use bridge DNS regardless.
  #
  #  Disable: set `profiles: ["never"]` on this service AND leave STT_API_TOKEN
  #  empty in .env. Patcher step 14 is env-gated (skipped when the token is
  #  unset), so dropping the token also cleanly opts out of the gateway wiring.
  ######################
  openclaw-stt-whisper:
    build: ./openclaw-stt-whisper/server
    image: openclaw-stt-whisper:0.1.0
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-stt-whisper
    hostname: openclaw-stt-whisper
    restart: unless-stopped
    # Host-side bind for debug access. Default 127.0.0.1 = loopback only (LAN
    # cannot reach it). Set STT_WHISPER_BIND=0.0.0.0 in .env to expose on the
    # LAN (Bearer-auth via STT_API_TOKEN). Sibling containers (gateway / CLI)
    # reach the service via bridge DNS regardless of this binding.
    ports:
      - "${STT_WHISPER_BIND:-127.0.0.1}:${STT_WHISPER_PORT:-8093}:8080"
    environment:
      # When set, every /v1/* request must include `Authorization: Bearer
      # <STT_API_TOKEN>`. /health is always unauth so Docker healthchecks
      # and bridge-DNS probes keep working.
      STT_API_TOKEN: ${STT_API_TOKEN:-}
      # Default points at the turbo CT2 build (MIT, ~1.6 GB VRAM, ~8× faster
      # than vanilla large-v3 thanks to a 4-layer pruned decoder). Multilingual
      # EN+HU works out of the box; pick this when voice-chat latency matters
      # (Fish Audio S2 Pro → LLM → STT roundtrip on Discord voice channels).
      # Switch to `Trendency/whisper-large-v3-hu` via STT_WHISPER_MODEL override
      # in .env if you want the HU-finetune for noisy / phone-grade Hungarian
      # audio (slower but ~3 percentage points lower HU WER on noisy mic input).
      # First-boot HF download for turbo is ~1.6 GB; no CT2 conversion required
      # (deepdml ships pre-converted CT2 weights), cached in the
      # stt-whisper-hf-cache volume afterwards.
      WHISPER_MODEL: ${STT_WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      WHISPER_COMPUTE_TYPE: ${STT_WHISPER_COMPUTE_TYPE:-float16}
      WHISPER_DEVICE: ${STT_WHISPER_DEVICE:-cuda}
      # Optional language pin. Empty = Whisper autodetects per request (default).
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      # The wrapper runs as root inside the CUDA base image; HF cache lands
      # in /root/.cache/huggingface.
      - stt-whisper-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # /health is always unauth (the wrapper's auth middleware exempts it by
      # path), so a plain curl without Authorization is sufficient. No need
      # to dance with escaped env vars.
      # for a $$-escaped env-var dance.
      #
      # Cold-start: uvicorn comes up in a few seconds, but the first
      # transcribe triggers a ~3 GB large-v3 CT2 weights download from
      # HuggingFace on a fresh volume (5-15 min). The healthcheck itself
      # doesn't wait on the model load — uvicorn responds to /health
      # immediately once the app is imported — so 60s start_period is plenty.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"

  ######################
  ## Browser automation — Playwright Chromium exposed over Chrome DevTools
  ## Protocol — OPT-IN (profile=browser).
  #
  #  Architecture: one long-lived Chromium per persisted profile (user-data-dir
  #  on the browser-storage Docker volume) plus one anonymous default profile.
  #  Each Chromium binds its own remote-debugging port. OpenClaw's built-in
  #  `browser` tool attaches via browser.profiles.<name>.cdpUrl; no MCP, no
  #  bespoke tool shim, no custom gateway plugin. See
  #  docs/reference/browser-automation.md for the full design rationale,
  #  including why we couldn't use ?profile= query routing (OpenClaw issues
  #  #4841/#9723/#11926).
  #
  #  Why opt-in despite Apache 2.0 + Chromium being free: the Playwright base
  #  image is ~1.7 GB on aarch64, and one warm Chromium per credential uses
  #  ~200-400 MB RAM. Users who don't want agent web browsing shouldn't pay
  #  for that overhead. Activation requires BOTH:
  #    1. BROWSER_API_TOKEN set in .env (bootstrap.sh handles this).
  #    2. The `browser` Compose profile active. Either:
  #         - COMPOSE_PROFILES=browser in .env (preferred), OR
  #         - --profile browser on the docker compose command line.
  #
  #  Networking:
  #    - 9220:        FastAPI management API + login-helper (operator side).
  #    - 9222-9241:   Chromium remote-debugging ports (default + 20 named
  #                   profiles). 9222 = "default" anonymous throwaway profile;
  #                   9223+ = named profiles in BROWSER_PROFILE_NAMES order.
  #    - 5901:        noVNC bridge — ALWAYS-ON since v0.7.0. Auth via
  #                   BROWSER_VNC_PASSWORD; the screen is blank when no
  #                   profile is in headful mode (login-helper toggle).
  #    All ports loopback-only by default. The OpenClaw gateway reaches the
  #    Chromium debug ports via bridge DNS at openclaw-browser:9222-9241.
  #
  #  Onboarding a credential (1x per service):
  #    docker compose --profile browser up -d --build openclaw-browser
  #    ./bootstrap-browser-login.sh github-user1
  #    # opens noVNC URL → operator logs in (password+TOTP, NOT passkeys —
  #    # WebAuthn doesn't work over noVNC by W3C spec) → presses Enter
  #    # → cookies persist; agent can browser.navigate(profile=...) freely
  #    #   for the next ~14d (GitHub) / ~30d (Notion) / etc.
  #
  #  Disable: leave BROWSER_API_TOKEN empty in .env AND drop `browser` from
  #  COMPOSE_PROFILES. Patcher step 15 is env-gated (skipped when the token
  #  is unset), so dropping the token cleanly opts out of gateway wiring.
  ######################
  openclaw-browser:
    profiles: ["browser"]
    build: ./openclaw-browser/server
    image: openclaw-browser:0.1.0
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-browser
    hostname: openclaw-browser
    restart: unless-stopped
    # tini handles PID 1 already (set by ENTRYPOINT in Dockerfile); also enable
    # init: true so docker's signalling is clean across the Chromium subprocess
    # tree.
    init: true
    # Loopback-only host bind for the management API and Chromium debug ports.
    # Set BROWSER_BIND=0.0.0.0 in .env if you need direct LAN access (you
    # likely don't — the gateway always uses bridge DNS).
    ports:
      - "${BROWSER_BIND:-127.0.0.1}:${BROWSER_API_PORT:-9220}:9220"
      - "${BROWSER_BIND:-127.0.0.1}:9222-9241:9222-9241"
      - "${BROWSER_VNC_BIND:-127.0.0.1}:${BROWSER_VNC_PORT:-5901}:5901"
    environment:
      # Required. Empty value fails fast at app startup (no anonymous access).
      BROWSER_API_TOKEN: ${BROWSER_API_TOKEN:-}
      # Required. Persistent password for the always-on noVNC bridge —
      # bootstrap.sh generates this on first run, rotate-secrets.sh --all
      # rotates it. Empty / placeholder fails fast at app startup.
      BROWSER_VNC_PASSWORD: ${BROWSER_VNC_PASSWORD:-}
      BROWSER_VNC_PORT: ${BROWSER_VNC_PORT:-5901}
      # Viewport for both Xvfb (headful) and Chromium --window-size. Default
      # 1920x1080 — full HD. Both values must match across the Xvfb screen
      # and the Chromium launch flag, otherwise iframe-rect math and
      # screenshot dimensions go out of sync.
      BROWSER_VIEWPORT_WIDTH: ${BROWSER_VIEWPORT_WIDTH:-1920}
      BROWSER_VIEWPORT_HEIGHT: ${BROWSER_VIEWPORT_HEIGHT:-1080}
      # Comma-separated list of named profiles. Maintained by
      # ./bootstrap-browser-login.sh — manual edits here also work but the
      # name's port assignment is positional, so don't reorder once profiles
      # are in active use (it would shuffle each profile's cdpUrl).
      BROWSER_PROFILE_NAMES: ${BROWSER_PROFILE_NAMES:-}
      BROWSER_API_PORT: ${BROWSER_API_PORT:-9220}
      BROWSER_PORT_BASE: ${BROWSER_PORT_BASE:-9222}
      BROWSER_MAX_PROFILES: ${BROWSER_MAX_PROFILES:-20}
      BROWSER_RATE_LIMIT_RPS: ${BROWSER_RATE_LIMIT_RPS:-0.5}
      BROWSER_RATE_LIMIT_BURST: ${BROWSER_RATE_LIMIT_BURST:-5}
      # Per-action CDP timeout. Bumped 2026-06-08 from 30s → 60s: heavy
      # JS-driven pages (YouTube, Wowhead, sites with many ad-iframes) blow
      # past 30s when building the ARIA accessibility tree for a `snapshot`
      # action — the agent saw "[tools] browser failed: timed out" on a
      # YouTube `snapshot` even though `open` succeeded and the tab was live.
      # 60s covers the worst real pages without hanging the agent turn.
      BROWSER_DEFAULT_TIMEOUT_MS: ${BROWSER_DEFAULT_TIMEOUT_MS:-60000}
      BROWSER_STORAGE_DIR: /storage
    volumes:
      - browser-storage:/storage
      - browser-diagnostics:/diagnostics
      - ./openclaw-browser/config:/config:ro
    tmpfs:
      # Chromium scratches /tmp at modest volume; cap to 512 MB so a runaway
      # download can't fill the host's tmpfs ceiling.
      - /tmp:rw,size=512m
    # Chromium OOMs without /dev/shm headroom under any moderate workload —
    # the in-process renderer uses shared memory for inter-thread message
    # passing. 1 GB is the well-trodden default.
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
      # The seccomp profile shipped at openclaw-browser/config/seccomp.json
      # is a placeholder by default; pull Playwright's upstream profile in to
      # block unneeded syscalls. Comment this line out to use Docker's
      # default profile (works fine for most flows; Chromium can SIGKILL on
      # certain memory patterns under it).
      # - seccomp=./openclaw-browser/config/seccomp.json
    cap_drop: [ALL]
    # CHOWN, SETUID, SETGID, DAC_OVERRIDE: required for Chromium's per-tab
    # process spawn (drops privileges to a sandbox UID inside the container).
    cap_add: [CHOWN, SETGID, SETUID, DAC_OVERRIDE]
    healthcheck:
      # /healthz is unauthenticated by design; both the Docker probe and
      # bootstrap-browser-login.sh's preflight rely on it.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:9220/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"

  ######################
  ## Python code-execution sandbox — OPT-IN (profile=python).
  #
  #  Self-hosted Python execution environment that the OpenClaw agent reaches
  #  over MCP (mcp.servers.python_sandbox, transport: streamable-http). One
  #  long-lived ipykernel per session_id — state (variables, imports, loaded
  #  CSVs) survives across calls so a multi-step analysis works without
  #  re-loading the dataset on every tool call. See
  #  docs/reference/python-sandbox.md for the full design rationale.
  #
  #  Why not the OpenClaw native `code_execution` tool: it routes to xAI's
  #  Responses API (cloud, paid). This stack is self-hosted by design.
  #  Why not `agents.defaults.sandbox` + the `exec` tool: that controls
  #  shell-tool execution gateway-wide; flipping it to Python-as-default
  #  would change behavior for every other tool too. The MCP path is
  #  Python-specific, scoped, and opt-in.
  #
  #  Activation requires BOTH:
  #    1. PYTHON_SANDBOX_API_TOKEN set in .env (bootstrap.sh handles this).
  #    2. The `python` Compose profile active. Either:
  #         - COMPOSE_PROFILES=python in .env (preferred), OR
  #         - --profile python on the docker compose command line.
  #
  #  Networking:
  #    - 8094 (MCP Streamable-HTTP, Bearer-auth'd).
  #    Loopback-only by default — the gateway reaches it via bridge DNS at
  #    openclaw-python-sandbox:8094. No published Chromium-style debug ports.
  #
  #  Egress: see PYTHON_SANDBOX_NETWORK in .env.example. Default "none" —
  #  user code can't reach SearxNG, vLLM, or the LAN. "bridge" is the
  #  override for use cases that genuinely need outbound HTTP (e.g.,
  #  scraping a public API the agent has been told to query).
  #
  #  Resources: 8 GB RAM + 4 CPU default (PYTHON_SANDBOX_MEMORY_MB,
  #  PYTHON_SANDBOX_CPUS). On GB10 with the default vLLM profile this
  #  leaves headroom; tune up if you load multi-GB dataframes.
  #
  #  Disable: leave PYTHON_SANDBOX_API_TOKEN empty AND drop `python` from
  #  COMPOSE_PROFILES. Patcher step 18 is env-gated (skipped when the
  #  token is unset), so the gateway wiring opts out cleanly.
  ######################
  openclaw-python-sandbox:
    profiles: ["python"]
    build:
      context: ./openclaw-python-sandbox/server
      dockerfile: Dockerfile
    image: openclaw-python-sandbox:0.1.0
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-python-sandbox
    hostname: openclaw-python-sandbox
    user: "1000:1000"
    restart: unless-stopped
    init: true
    ports:
      # Loopback bind so the host-side smoke command (curl /healthz) works
      # without docker exec gymnastics. The gateway uses bridge DNS, so
      # publishing isn't strictly required — it's purely operator ergonomics.
      - "${PYTHON_SANDBOX_BIND:-127.0.0.1}:${PYTHON_SANDBOX_PORT:-8094}:8094"
      # Preview/hosting port (2026-06-08). An operator (or the agent) can launch
      # a dev server INSIDE the container bound to 0.0.0.0:8095 — `ng serve
      # --host 0.0.0.0 --port 8095`, `python -m http.server 8095`, a Go/Java
      # app, etc. — and reach it on the host's published 8095. nginx then
      # proxies sandbox.petyuspolisz.com → <host>:8095. Bound to 0.0.0.0 so the
      # nginx-proxy-manager (running in host-net, pointing its upstream at the
      # host LAN IP 192.168.111.100:8095) can reach it — a 127.0.0.1-only bind
      # gives the NPM a 502 because it dials the LAN IP, not loopback. The
      # public gate is NPM + Cloudflare (SSL), so LAN exposure of the raw
      # preview port is acceptable in this homelab. Override via env if needed.
      - "${SANDBOX_PREVIEW_BIND:-0.0.0.0}:${SANDBOX_PREVIEW_PORT:-8095}:8095"
    environment:
      # Required. Empty value fails fast at app startup — a token-less
      # sandbox would let any container on the bridge run arbitrary code.
      PYTHON_SANDBOX_API_TOKEN: ${PYTHON_SANDBOX_API_TOKEN:-}
      # Per-execution wall-clock cap. Long-running analyses can bump this;
      # the kernel is interrupted (not killed) on timeout so subsequent
      # calls in the same session keep working.
      PYTHON_SANDBOX_KERNEL_TIMEOUT_S: ${PYTHON_SANDBOX_KERNEL_TIMEOUT_S:-30}
      # Truncation cap on (stdout + stderr + plot bytes) returned per call.
      # 10 MB is generous for tool-call payloads; bump if you regularly
      # send large plots.
      PYTHON_SANDBOX_MAX_OUTPUT_BYTES: ${PYTHON_SANDBOX_MAX_OUTPUT_BYTES:-10485760}
      # Idle kernel reaper: shut down kernels not used for this many seconds.
      # Trades memory for warm-cache convenience; a reaped session loses
      # state and the next call starts fresh.
      PYTHON_SANDBOX_IDLE_TTL_S: ${PYTHON_SANDBOX_IDLE_TTL_S:-1800}
      PYTHON_SANDBOX_REAP_INTERVAL_S: ${PYTHON_SANDBOX_REAP_INTERVAL_S:-300}
      # Whisper STT bridge for the transcribe_audio MCP tool (2026-06-08).
      # The token lives ONLY in this server process — kernel_pool.py strips it
      # from the child kernel env, so user code in python_exec cannot read it
      # via os.environ. This is the "dedicated tool holds the token" isolation:
      # the agent downloads media with yt-dlp+ffmpeg in python_exec, then calls
      # transcribe_audio(path=...) and the server-side handler does the
      # token-authenticated POST to Whisper. Same token as openclaw-stt-whisper.
      STT_BASE_URL: ${OPENCLAW_STT_BASE_URL:-http://openclaw-stt-whisper:8080/v1}
      STT_API_TOKEN: ${STT_API_TOKEN:-}
      STT_MODEL: ${OPENCLAW_STT_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      # Cap on the audio file size transcribe_audio will POST (guards the STT
      # container from an OOM on a multi-GB file). Default 200 MB.
      STT_MAX_FILE_BYTES: ${STT_MAX_FILE_BYTES:-209715200}
      # git_push tool (2026-06-09): the agent can commit+push a local repo to ONE
      # preconfigured GitHub repo. The PAT lives ONLY here (uvicorn env) — kernel_pool
      # strips GITHUB_TOKEN from user kernels, and the tool feeds it to git via
      # GIT_ASKPASS (never argv/.git/config). Set a FINE-GRAINED PAT scoped to the one
      # repo with Contents:read+write. Empty token → the tool returns "not configured".
      # GITHUB_REPO is owner/repo; the agent can ONLY push there (cannot target others).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      # When GITHUB_REPO doesn't exist yet, git_push auto-creates it under the token's
      # account (a dedicated bot account only needs to hand over a token — no manual repo
      # creation; needs a classic PAT with `repo` scope, or fine-grained that can create).
      # This is the visibility of the auto-created repo. Default private; false = public.
      GITHUB_REPO_PRIVATE: ${GITHUB_REPO_PRIVATE:-true}
      GIT_DEFAULT_BRANCH: ${GIT_DEFAULT_BRANCH:-main}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-ImbulClaw}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-bot@petyuspolisz.com}
    volumes:
      # /workspace is the canonical place for the agent to read/write files.
      # Bind-mounted from the host so files persist across recreates and so
      # the operator can drop CSVs in for the agent to analyze.
      - ${OPENCLAW_WORKSPACE_DIR}/sandbox:/workspace:rw
      # Shared canvas dir, mounted at the SAME path the gateway sees it
      # (/home/node/.openclaw/canvas). This lets the agent download media in
      # python_exec (e.g. yt-dlp → /home/node/.openclaw/canvas/clip.mp3) and
      # then attach it to Discord via the `upload-file` action using the
      # IDENTICAL path — the canvas dir is in the discord-friend agent's
      # media-local-roots, so upload-file is allowed to read it. Without this
      # shared mount the file would land in /workspace/sandbox, which is
      # OUTSIDE the agent's media roots → upload-file gets access-denied.
      # Same path on both sides means one path convention for the agent.
      # (2026-06-08 — audio/file attachment support.)
      - ${OPENCLAW_CONFIG_DIR}/canvas:/home/node/.openclaw/canvas:rw
    # No `networks:` directive — the sandbox joins the project's default
    # bridge so the gateway can reach it via DNS at openclaw-python-sandbox.
    # PYTHON_SANDBOX_NETWORK in .env is a documented placeholder for a
    # future v0.8.x patch that will offer an `internal: true` network
    # opt-in; today, egress is controlled by the absence of network-using
    # libraries in the image plus the kernel's lack of root for raw
    # sockets. If you need hard network isolation, drop a docker network
    # rule (`docker network create --internal`) and override at runtime.
    mem_limit: ${PYTHON_SANDBOX_MEMORY_MB:-8192}m
    cpus: ${PYTHON_SANDBOX_CPUS:-4}
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8094/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"

  ######################
  ## OpenClaw Config Patcher (init service, idempotent, runs before every `up`)
  #
  #  Ensures the local openclaw.json is in the expected state regardless of
  #  the onboarding wizard's choices or previous manual edits. 23 steps:
  #
  #    1. Cleanup: remove legacy `models.providers.vllm.capabilities` (old schema).
  #    2. Ensure vllm provider core: baseUrl / api / apiKey from .env.
  #    3. Ensure Gemma 4 NVFP4 entry in the provider's models[] catalog
  #       (the onboarding wizard does NOT auto-register it — without the entry,
  #        OpenClaw can't route tool calls to this model).
  #    4. Ensure memorySearch: provider=openai, model=BAAI/bge-m3,
  #       remote.baseUrl=http://vllm-embedding:8005/v1/, remote.apiKey=VLLM_API_KEY.
  #    5. Ensure heartbeat: 30m periodic check-in, includeReasoning=true,
  #       isolatedSession=true, activeHours (configurable via .env).
  #    6. Ensure/cleanup dreaming (memory-core plugin): env-gated via
  #       OPENCLAW_ENABLE_DREAMING=1. Needs OpenClaw image >= 2026.4.15.
  #    7. Ensure gateway.trustedProxies: loopback + docker bridge CIDR + the
  #       LAN CIDR from the env (for direct LAN clients bypassing the CDN).
  #    8. Ensure agents.defaults.llm.idleTimeoutSeconds=300: LLM idle watchdog
  #       (default 120s too tight for 31B + reasoning + multi-tool-call chains).
  #    9. Ensure memorySearch hybrid (BM25 + vector) retrieval with MMR re-rank.
  #       SQLite FTS5 BM25 supplements bge-m3 on exact-keyword / ID / proper-noun
  #       matches; MMR re-rank widens result diversity. Native OpenClaw feature,
  #       upgrade-safe, no extra services.
  #   10. Ensure webSearch provider = searxng + flip the bundled searxng plugin's
  #       `enabled` flag to true. The plugin ships bundled-but-default-disabled;
  #       without this step the webSearch tool never lights up at runtime. Also
  #       wires baseUrl + categories + language for the sibling searxng service.
  #   11. Ensure messages.tts.providers.openai is wired at the openclaw-tts-fish
  #       (OpenAI-compat baseUrl override, sanctioned per closed OpenClaw issues
  #       #13907 / #29224) + voiceAliases for human-readable voice names.
  #       Env-gated: skipped when OPENCLAW_TTS_FISH_API_KEY is unset, so the
  #       openai TTS provider stays untouched if the user opts out of TTS.
  #   12. Mirror gateway.auth.token into gateway.remote.token so the loopback
  #       CLI can WS-connect without hitting "gateway token mismatch" and
  #       silently falling back to an embedded runner — a side-car path, not
  #       the production agent route.
  #   13. Sync per-agent auth-profiles.json `vllm:default.key` with VLLM_API_KEY.
  #       The agent runner reads the credential from this per-agent store, NOT
  #       from models.providers.vllm.apiKey — drift after a .env rotation
  #       produces HTTP 401 from vLLM even when the config-file apiKey is correct.
  #   14. Ensure tools.media.audio.enabled=true and upsert a models[] entry
  #       with provider=openai, baseUrl pointing at openclaw-stt-whisper, the
  #       configured model id, and a per-entry `headers.Authorization: Bearer
  #       $STT_API_TOKEN` so the Whisper backend auth does not collide with
  #       any global models.providers.openai.apiKey. Env-gated: skipped when
  #       STT_API_TOKEN is unset, so removing the token cleanly opts out of
  #       the gateway wiring (service block can be parked separately).
  #   15. Ensure browser.enabled=true and write one browser.profiles.<name>
  #       entry per registered Chromium profile in openclaw-browser. Default
  #       profile lands on port BROWSER_PORT_BASE (9222); each name in
  #       BROWSER_PROFILE_NAMES (comma-separated) gets the next port in
  #       sequence. Auth is `?token=<BROWSER_API_TOKEN>` in the cdpUrl —
  #       OpenClaw's cdpUrl config field accepts query tokens and HTTP Basic
  #       URL auth only, not Authorization headers. Env-gated: skipped when
  #       BROWSER_API_TOKEN is unset, so leaving the token empty cleanly opts
  #       out of browser wiring (the openclaw-browser service block is also
  #       parked behind `profiles: ["browser"]` and stays inactive without
  #       --profile browser).
  #   16. Idempotently inject a soft browser-policy block into the workspace
  #       AGENTS.md (HTML-comment-marked region, deep-merge style). Tells the
  #       agent: default profile for throwaway browsing, opt-in to the
  #       credentialed profiles only when the task requires that identity,
  #       never persist via the default profile. v0.7.0+.
  #   17. Idempotently inject a browser.act cheatsheet block into the
  #       workspace AGENTS.md. Smaller open models (Gemma 4 in particular)
  #       routinely emit the flat {element, text} shape on kind="fill"
  #       actions; the cheatsheet shows the right nested {fields: [...]}
  #       shape so the normalizer doesn't reject the call and the agent
  #       doesn't doom-loop trying to re-emit a broken request. v0.7.1+.
  #   18. Ensure mcp.servers.python_sandbox is wired at the
  #       openclaw-python-sandbox service (transport: streamable-http,
  #       headers Authorization: Bearer $PYTHON_SANDBOX_API_TOKEN). Env-gated:
  #       when PYTHON_SANDBOX_API_TOKEN is unset, the entry is REMOVED from
  #       openclaw.json so the gateway doesn't try to dial a parked service
  #       (the openclaw-python-sandbox block is also parked behind
  #       `profiles: ["python"]`). v0.8.0+.
  #   19. Ensure mcp.servers.comfyui_image is wired at the
  #       openclaw-image-comfyui bridge (transport: streamable-http, headers
  #       Authorization: Bearer $IMAGE_GEN_API_TOKEN). The bridge lives in a
  #       SEPARATE compose file (openclaw-image-comfyui/docker-compose.yml,
  #       opt-in via `--profile image-gen`) joined to this stack's bridge
  #       via external-network reference. Env-gated: when IMAGE_GEN_API_TOKEN
  #       is unset, the entry is REMOVED from openclaw.json so the gateway
  #       doesn't try to dial a parked service. v0.9.0+.
  #   20. Discord ackReactionScope=off — defends openclaw issue #46024
  #       stale-queue reaction-cycle bug. Only writes when channels.discord
  #       is configured AND user hasn't set the field themselves. v0.11.0+.
  #   21. Discord actions.reactions toggle — default `true`; works with the
  #       bundled vllm-llm gemma4 colon-namespace parser patch. Env override:
  #       OPENCLAW_DISCORD_ACTIONS_REACTIONS=false. v0.11.0+.
  #   22. Discord-routed agent tools.alsoAllow +=
  #       `group:messaging,browser,tts,canvas` so the message / browser /
  #       tts / canvas tools aren't catalog-filtered out under the default
  #       `coding` profile. Walks the top-level bindings[] for the
  #       channel=discord agentId, preserves operator-added entries.
  #       v0.11.0+ (default widened from `group:messaging` only in
  #       v0.11.1+; routing-source bug fixed in v0.11.1 — earlier
  #       versions read agents.routes[] which doesn't exist in the
  #       openclaw 2026.4.x schema, so the step was a silent no-op).
  #   23. Ensure ${OPENCLAW_CONFIG_DIR}/canvas exists for Path A image-gen
  #       inline rendering. The bridge mirrors generated PNGs there and
  #       emits `[embed url="/__openclaw__/canvas/<file>"]` shortcodes the
  #       gateway serves under /__openclaw__/canvas/. Idempotent mkdir,
  #       not env-gated (an empty dir is harmless when Path A is off).
  #       v0.11.0+ (was a manual mkdir step before).
  #   24. Discord progressive streaming — channels.discord.streaming and
  #       optional draftChunk sub-knobs. Defaults to `partial` (single
  #       preview message, edit-in-place). v0.11.0+.
  #   25. Discord-routed agent tools.profile — default `full`. Without an
  #       explicit profile the agent inherits OpenClaw's non-main default
  #       `coding`, which excludes browser/tts/canvas. Step writes the
  #       profile only when undefined (operator-set values preserved).
  #       v0.11.1+.
  #   26. Workspace-discord AGENTS.md patcher-managed blocks (cron-tools
  #       cheatsheet + browser-tools cheatsheet, mirrored from step 17 to
  #       the discord-friend's separate workspace). Idempotent; skips
  #       cleanly if the file doesn't exist (pre-onboarding). v0.11.1+.
  #
  #  If openclaw.json doesn't exist yet (pre-onboarding state), exits 0 — the
  #  gateway starts anyway and the onboarding wizard can run interactively.
  ######################
  openclaw-config-init:
    # Local extension of the upstream image with ffmpeg installed, so the
    # gateway's Discord text-channel TTS-attachment path
    # (messages.tts.auto = always) doesn't crash on a missing binary.
    # The build runs once on this service; openclaw-gateway and openclaw-cli
    # below reference the same tag and reuse the cached image. See
    # openclaw-base-ext/Dockerfile for the rationale.
    image: openclaw-base-ext:${OPENCLAW_BASE_EXT_VERSION:-0.11.1}
    build:
      context: ./openclaw-base-ext
      args:
        OPENCLAW_BASE: ghcr.io/openclaw/openclaw${OPENCLAW_IMAGE_REF:-:latest}
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-config-init
    user: "1000:1000"
    restart: "no"
    environment:
      VLLM_API_KEY: ${VLLM_API_KEY:-}
      OPENCLAW_ENABLE_DREAMING: ${OPENCLAW_ENABLE_DREAMING:-0}
      OPENCLAW_HEARTBEAT_ACTIVE_START: ${OPENCLAW_HEARTBEAT_ACTIVE_START:-09:00}
      OPENCLAW_HEARTBEAT_ACTIVE_END: ${OPENCLAW_HEARTBEAT_ACTIVE_END:-02:00}
      OPENCLAW_HEARTBEAT_TZ: ${OPENCLAW_HEARTBEAT_TZ:-UTC}
      OPENCLAW_LAN_CIDR: ${OPENCLAW_LAN_CIDR:-}
      # Override the in-compose vllm-llm / vllm-embedding DNS targets when the
      # vLLM stack runs on a different host (remote DGX over LAN, cloud OpenAI-
      # compatible endpoint, etc.). Defaults preserve the standard in-compose
      # layout. See docs/CUSTOMIZATION.md → "Run with a remote vLLM backend".
      LLM_BASE_URL: ${LLM_BASE_URL:-http://vllm-llm:8004/v1/}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://vllm-embedding:8005/v1/}
      # These five were read by the patcher all along but never declared here —
      # compose does NOT pass .env into containers implicitly, so operator
      # overrides of them silently never reached the patcher (fixed 2026-06-10).
      # Defaults mirror the patcher-side fallbacks so the declared wiring is a
      # no-op for existing deploys.
      LLM_DENSE_BASE_URL: ${LLM_DENSE_BASE_URL:-http://vllm-llm-dense:8005/v1/}
      LLM_MODEL_ID: ${LLM_MODEL_ID:-}
      LLM_CONTEXT_WINDOW: ${LLM_CONTEXT_WINDOW:-131072}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-1800}
      LLM_REASONING_ENABLED: ${LLM_REASONING_ENABLED:-true}
      # TTS provider wiring. When set, patcher step 11 writes
      # messages.tts.providers.openai.{baseUrl,apiKey,model,voiceId,voiceAliases}
      # pointing at the openclaw-tts-fish service (Fish Audio S2 Pro via
      # SGLang-Omni). Leave empty to opt out — the patcher then leaves the
      # openai TTS provider untouched (and the fish service block above can be
      # parked with `profiles: ["never"]`).
      OPENCLAW_TTS_FISH_API_KEY: ${OPENCLAW_TTS_FISH_API_KEY:-}
      OPENCLAW_TTS_FISH_URL: ${OPENCLAW_TTS_FISH_URL:-http://openclaw-tts-fish:8080/v1}
      OPENCLAW_TTS_DEFAULT_VOICE: ${OPENCLAW_TTS_DEFAULT_VOICE:-default_en}
      # Auto-attach mode for messages.tts (patcher step 11). Default 'always'
      # speaks every final reply (voice channels, VoiceCall). Discord text-channel
      # deploys must use 'tagged' — see .env.example notes; the gateway image
      # lacks ffmpeg and the text-channel attachment pipeline crashes silently
      # with `[discord] final reply failed: Error: ffmpeg not found` otherwise.
      OPENCLAW_TTS_AUTO: ${OPENCLAW_TTS_AUTO:-always}
      # Discord ackReactionScope (patcher step 20). Defends against upstream
      # issue #46024 stale-queue reaction-cycle bug. Default 'off' kills the
      # auto-emoji lifecycle entirely; agent can still emit explicit reactions
      # via tool call when it actually means to. Override with 'group-mentions'
      # / 'direct' / 'all' if you want the lifecycle feedback (and accept the
      # cycling on guild mentions).
      OPENCLAW_DISCORD_ACK_REACTION_SCOPE: ${OPENCLAW_DISCORD_ACK_REACTION_SCOPE:-off}
      # Discord actions.reactions (patcher step 21). Default 'true' (enabled).
      # This stack ships a custom vllm-llm image (./vllm-llm/) with a patch to
      # the Gemma4 tool-call parser so colon-namespace tools like
      # `discord:add_reaction` work. Set 'false' if running an unpatched
      # upstream vllm/vllm-openai image, or to strip reaction permissions
      # entirely for guild-rule reasons.
      OPENCLAW_DISCORD_ACTIONS_REACTIONS: ${OPENCLAW_DISCORD_ACTIONS_REACTIONS:-true}
      # Discord progressive streaming (patcher step 24). Default 'partial' —
      # single preview message edits in place as tokens arrive. See
      # .env.example for the full mode/draftChunk explanation. Override or
      # set to empty string to skip the step entirely.
      OPENCLAW_DISCORD_STREAMING: ${OPENCLAW_DISCORD_STREAMING:-partial}
      # Optional draftChunk fine-tune (patcher step 24, sub-knobs). Each is
      # independently optional; leaving any unset means the patcher leaves
      # the corresponding field unwritten and OpenClaw uses its docs default
      # (200 / 800 / "paragraph"). Set MIN_CHARS=100 + BREAK_PREFERENCE=line
      # for line-grain typing UX. The breakPreference enum is not
      # exhaustively documented upstream — paragraph / line / sentence are
      # operator-tested.
      OPENCLAW_DISCORD_DRAFTCHUNK_MIN_CHARS: ${OPENCLAW_DISCORD_DRAFTCHUNK_MIN_CHARS:-}
      OPENCLAW_DISCORD_DRAFTCHUNK_MAX_CHARS: ${OPENCLAW_DISCORD_DRAFTCHUNK_MAX_CHARS:-}
      OPENCLAW_DISCORD_DRAFTCHUNK_BREAK_PREFERENCE: ${OPENCLAW_DISCORD_DRAFTCHUNK_BREAK_PREFERENCE:-}
      # Tool-progress display in the streaming preview ("Working...\n- tool:
      # <name>"). Default unset → upstream default `true` applies. Set to
      # `false` to suppress the lines entirely (workaround for the Discord
      # markdown-mangle on tool names like `comfyui_image__generate`).
      OPENCLAW_DISCORD_STREAMING_PREVIEW_TOOL_PROGRESS: ${OPENCLAW_DISCORD_STREAMING_PREVIEW_TOOL_PROGRESS:-}
      # Discord-routed agent tool profile (patcher step 25). Default `full`
      # — same effective surface as the main agent (cron, browser,
      # image_generate, web_search, memory, python_sandbox, tts, canvas,
      # messaging). The OpenClaw non-main default `coding` excludes
      # browser/tts/canvas; the bot then replies "I can't navigate the
      # browser" to screenshot requests and silently drops `[[tts:speak]]`
      # directives. Set empty to skip the step (preserves whatever's in
      # openclaw.json). Enum: minimal | coding | messaging | full.
      OPENCLAW_DISCORD_AGENT_TOOLS_PROFILE: ${OPENCLAW_DISCORD_AGENT_TOOLS_PROFILE:-full}
      # Discord-routed agent tools.alsoAllow additions (patcher step 22).
      # Comma-separated list ADDED on top of the profile. Default
      # `group:messaging,browser,tts,canvas,cron` — `group:messaging` is
      # what registers the cron tool-handler on the discord-route runtime
      # tool-resolver (verified 2026-05-07: removing it breaks `Tool cron
      # not found` on BOTH DM and guild routes). Yes, the gateway logs
      # an "unknown entries (group:messaging)" warning on it — that's
      # upstream-cosmetic, not a real block. `cron` is added explicitly
      # so the per-route filter sees it. `browser/tts/canvas` are
      # belt-and-braces if a tighter profile is chosen later. Set empty
      # to skip the step.
      OPENCLAW_DISCORD_AGENT_ALSO_ALLOW: ${OPENCLAW_DISCORD_AGENT_ALSO_ALLOW:-group:messaging,browser,tts,canvas,cron}
      # Discord-friend agent UX cheatsheet blocks in workspace-discord/AGENTS.md
      # (patcher step XXa/b/c, added 2026-06-06 in response to Reverend Green's
      # review). Each independently env-gated so the operator can A/B individual
      # rules without redeploying the patcher.
      OPENCLAW_DISCORD_AGENT_FORMAT_RULES: ${OPENCLAW_DISCORD_AGENT_FORMAT_RULES:-}
      OPENCLAW_DISCORD_AGENT_IMAGE_HISTORY_RULE: ${OPENCLAW_DISCORD_AGENT_IMAGE_HISTORY_RULE:-}
      OPENCLAW_DISCORD_AGENT_SKILLS_CHEATSHEET: ${OPENCLAW_DISCORD_AGENT_SKILLS_CHEATSHEET:-}
      OPENCLAW_DISCORD_AGENT_TOOL_ORCHESTRATION: ${OPENCLAW_DISCORD_AGENT_TOOL_ORCHESTRATION:-}
      OPENCLAW_DISCORD_AGENT_I2I_CHEATSHEET: ${OPENCLAW_DISCORD_AGENT_I2I_CHEATSHEET:-}
      # 2026-06-06 — Active Memory plugin (bundled, default-off). On enable,
      # injects relevant long-term memory chunks into every reply context on
      # the discord-friend agent — so the bot "remembers" cross-channel.
      OPENCLAW_ACTIVE_MEMORY: ${OPENCLAW_ACTIVE_MEMORY:-}
      # 2026-06-06 — Block F: deep agentic multi-step task decomposition rule
      # in workspace-discord/AGENTS.md (env-gated, opt-in). Teaches the bot to
      # chain 5-15+ tool calls on real tasks. Paired with idleTimeout=1800s.
      OPENCLAW_DISCORD_AGENT_DEEP_AGENTIC: ${OPENCLAW_DISCORD_AGENT_DEEP_AGENTIC:-}
      # 2026-06-07 — Block G: anti-hallucination honesty rule. Forbids the bot
      # from inventing "subagent" tool-calls or promising background work the
      # bot has no runtime to perform. Surfaced after a 01:40 incident where
      # Gemma 4 fabricated "Code Architect / Asset Designer" subagents and
      # claimed to "work overnight" — neither is true.
      OPENCLAW_DISCORD_AGENT_HONESTY: ${OPENCLAW_DISCORD_AGENT_HONESTY:-}
      # Sender-identity discipline cheatsheet (default on). Guild channels are
      # multi-user; the agent must key per-user rules (nickname, greeting,
      # promises) on the CURRENT message's sender_id and never carry one user's
      # rule onto another. Added after a 2026-06-08 incident where the bot
      # greeted Yagi with a Nilatah-specific "üdv meleg hercegem" and treated
      # Yagi as Nilatah. Set to off to remove the block.
      OPENCLAW_DISCORD_AGENT_SENDER_IDENTITY: ${OPENCLAW_DISCORD_AGENT_SENDER_IDENTITY:-on}
      # 2026-06-08 — native sub-agent delegation cheatsheet block. The
      # sessions_spawn/sessions_yield tools ship with the "full" tool profile and the
      # Gemma 4 MoE drives the spawn→yield→announce protocol correctly (gate-tested:
      # F(25)=75025 computed in an isolated child sub-agent). This knob writes the
      # AGENTS.md delegation recipe (WHEN/HOW to delegate heavy multi-step tasks).
      # Default on; `off` removes the block. NOTE: the 2026.6.1 schema REJECTS an
      # `agents.defaults.subagents` bounds object (gateway crash-loop) — the patcher
      # self-heals by removing it. The capability needs no extra config; OpenClaw's
      # built-in subagent defaults + Discord's ~15-min interaction cap bound it. (A
      # confirmed-schema bounds step is deferred — see CHANGELOG / docs/reference.)
      OPENCLAW_DISCORD_AGENT_SUBAGENTS: ${OPENCLAW_DISCORD_AGENT_SUBAGENTS:-on}
      # Discord-routed agent thinkingDefault (patcher step 25c). Default
      # `high` (bumped 2026-06-08 from `minimal`) — Gemma 4 NVFP4 on the
      # `--reasoning-parser gemma4` pipeline benefits from larger thinking
      # budgets on nuanced Hungarian prompts where tool-discipline matters
      # (e.g. lyrics search "szám"=song disambiguation). Latency: ~2-3×
      # slower prefill vs `minimal`, ~10-15s typical. Fall back to `medium`
      # or `low` if you need snappier replies. Enum: off|minimal|low|medium|
      # high|xhigh|adaptive|max. Empty disables.
      OPENCLAW_DISCORD_AGENT_THINKING: ${OPENCLAW_DISCORD_AGENT_THINKING:-high}
      # Per-guild cron tool allow-list (patcher step 24c). Comma-separated
      # Discord guild snowflake IDs where the cron tool should be available
      # on text channels. Without an entry the runtime per-guild policy
      # filter strips cron from the visible catalog (gateway logs
      # "shipped core tools but unavailable in the current
      # runtime/provider/model/config"). Default empty (no guilds get
      # cron on text channels by default — operator opt-in per guild).
      OPENCLAW_DISCORD_GUILD_CRON_IDS: ${OPENCLAW_DISCORD_GUILD_CRON_IDS:-}
      # Discord slash-command authorization mode (patcher step 28). Defends
      # against issue #19310: native slash commands work in DM via dmPolicy=
      # "pairing" but get silently blocked on guild channels because the
      # dual perm check (allowFrom + per-guild users) is empty by default.
      # `open` (default) writes allowFrom=["*"] + dmPolicy=open + groupPolicy=
      # open, letting every guild member use slash commands. `allowlist`
      # skips the step entirely; `owner-only` locks to OPENCLAW_DISCORD_OWNER_IDS.
      OPENCLAW_DISCORD_AUTHZ: ${OPENCLAW_DISCORD_AUTHZ:-open}
      OPENCLAW_DISCORD_OWNER_IDS: ${OPENCLAW_DISCORD_OWNER_IDS:-}
      # Discord voice subsystem (patcher step 29). `stt-tts` (default)
      # registers /vc join|leave|status and implicitly uses this stack's
      # self-hosted faster-whisper turbo (port 8093) + Fish Audio S2 Pro
      # (openclaw-tts-fish, port 8091). Note: upstream OpenClaw 2026.4.22
      # does NOT ship a real STT→LLM→TTS audio loop on Discord voice channels
      # yet (issue #49246 still open); /vc join makes the bot SIT in the voice
      # channel but it won't hear or speak. Set `off` to hide /vc commands
      # entirely until upstream lands a working loop.
      OPENCLAW_DISCORD_VOICE: ${OPENCLAW_DISCORD_VOICE:-stt-tts}
      # Discord thread bindings (patcher step 29). `on` (default) registers
      # /focus, /unfocus, /agents, /session — lets a thread bind to a
      # session for context-rail continuation.
      OPENCLAW_DISCORD_THREAD_BINDINGS: ${OPENCLAW_DISCORD_THREAD_BINDINGS:-on}
      # Discord guild mention gate (patcher step 30, wildcard `guilds["*"]`
      # so no operator guild IDs end up in the public repo). `off` (default)
      # opens the gate everywhere; `on` preserves upstream's mention-
      # required default. The `/activation` slash is a separate layer (LLM
      # behavior hint, not a gate toggle) — see CLAUDE.md "Discord mention
      # gate vs /activation slash".
      OPENCLAW_DISCORD_REQUIRE_MENTION: ${OPENCLAW_DISCORD_REQUIRE_MENTION:-off}
      # Image-gen workflow-picker cheatsheet (patcher step 27). When set,
      # appends a `<!-- patch-config:image-gen-tools:* -->` block to the
      # discord-friend agent's workspace-discord/AGENTS.md so Gemma surfaces
      # the v0.11.0 max-quality 4K bundle workflows from prompt context
      # (without it, agents see workflow names only via list_workflows and
      # routing degrades to random). Empty = skip the step (use this when
      # the bundle isn't installed yet — avoids docs that point at
      # workflows that would fail at ComfyUI's prompt-validate). The same
      # value is also read by the bridge's app.py to fill the
      # comfyui_image__generate tool's default `workflow` arg.
      IMAGE_GEN_DEFAULT_WORKFLOW: ${IMAGE_GEN_DEFAULT_WORKFLOW:-}
      # LTX-Video 2.3 cheatsheet gate (patcher step 27b, v0.12.0+). When
      # set to a truthy value, the patcher appends the video workflow
      # picker block to workspace-discord/AGENTS.md. Same idempotent
      # marker-block pattern as IMAGE_GEN_DEFAULT_WORKFLOW (step 27);
      # leave empty before LTX models are installed so the cheatsheet
      # doesn't point at a tool that errors out on every call.
      LTX_VIDEO_ENABLED: ${LTX_VIDEO_ENABLED:-}
      LTX_VIDEO_DEFAULT_LENGTH_FRAMES: ${LTX_VIDEO_DEFAULT_LENGTH_FRAMES:-145}
      LTX_VIDEO_DEFAULT_FPS: ${LTX_VIDEO_DEFAULT_FPS:-24}
      LTX_VIDEO_MAX_DURATION_S: ${LTX_VIDEO_MAX_DURATION_S:-10}
      # vLLM idle watchdog timeout (patcher step 8). Default 600s gives
      # headroom for slow image-gen workloads (FLUX, 1024×1024 SDXL). Drop
      # to 300 for fast-model-only deploys.
      # Default empty for 2026.6.1+ — the patcher skips agents.defaults.llm writes
      # when this is empty/'skip'/'off' (schema reject on 2026.6.1+). On 2026.4.x
      # an operator can set a numeric value to restore the legacy 600s ceiling.
      OPENCLAW_LLM_IDLE_TIMEOUT_SECONDS: ${OPENCLAW_LLM_IDLE_TIMEOUT_SECONDS-}
      # Per-file char budget for workspace bootstrap files (AGENTS.md,
      # USER.md, etc.) — written by patcher step 8b into
      # agents.defaults.bootstrapMaxChars. Upstream SDK default is
      # 12000; we bump to 20000 so the discord-friend agent's AGENTS.md
      # (image cheatsheet + video cheatsheet + browser cheatsheet +
      # cron cheatsheet, ~14k chars combined) fits without truncation.
      # Without this bump the tail of AGENTS.md gets cut and the agent
      # never sees the later cheatsheet blocks (verified live 2026-05-14:
      # video cheatsheet additions were cut → bot defaulted to T2V on
      # I2V intents).
      # Default bumped 20000 → 60000 (2026-06-07) once AGENTS.md grew past
      # 30 KB with Block G honesty + Block F deep-agentic + LTX-video etc.
      # Plus total-cap raised: per-file 60k, total 80k.
      OPENCLAW_BOOTSTRAP_MAX_CHARS: ${OPENCLAW_BOOTSTRAP_MAX_CHARS:-60000}
      OPENCLAW_BOOTSTRAP_TOTAL_MAX_CHARS: ${OPENCLAW_BOOTSTRAP_TOTAL_MAX_CHARS:-80000}
      # 2026.6.1+ sandbox-browser enable for `browser` tool target="sandbox".
      OPENCLAW_SANDBOX_BROWSER: ${OPENCLAW_SANDBOX_BROWSER:-on}
      # Default CDP profile when `browser` tool called without explicit profile.
      OPENCLAW_BROWSER_DEFAULT_PROFILE: ${OPENCLAW_BROWSER_DEFAULT_PROFILE:-self-hosted}
      # 2026.6.1 regression-fix: Discord plugin default suppressEmbeds=true
      # kills auto-embed on every URL. Default off here = explicit `false` in
      # config = auto-embed restored.
      OPENCLAW_DISCORD_SUPPRESS_EMBEDS: ${OPENCLAW_DISCORD_SUPPRESS_EMBEDS:-off}
      # Slash-command + elevated-tool authz wildcards (default "*" = open to
      # everyone). Narrow these to comma-separated Discord snowflakes (as
      # STRINGS — JS Number precision rounds 19-digit IDs and the equality
      # check fails) if you want owner-only command surfaces.
      OPENCLAW_DISCORD_COMMANDS_ALLOW: ${OPENCLAW_DISCORD_COMMANDS_ALLOW:-*}
      OPENCLAW_DISCORD_COMMAND_OWNERS: ${OPENCLAW_DISCORD_COMMAND_OWNERS:-*}
      OPENCLAW_TOOLS_ELEVATED_DISCORD_ALLOW: ${OPENCLAW_TOOLS_ELEVATED_DISCORD_ALLOW:-*}
      # tools.agentToAgent — cross-agent messaging surface (sessions_send to a
      # DIFFERENT agent id, e.g. discord-friend → main). Distinct from sub-agent
      # SPAWN (same agent, no config). Schema captured from the live 2026.6.1 WebGUI
      # (the schema oracle): { enabled, allow:[agentId|"*"] }. Default on, allow "*"
      # (any configured agent). off/0/false → patcher removes the block.
      OPENCLAW_TOOLS_AGENT_TO_AGENT: ${OPENCLAW_TOOLS_AGENT_TO_AGENT:-on}
      OPENCLAW_TOOLS_AGENT_TO_AGENT_ALLOW: ${OPENCLAW_TOOLS_AGENT_TO_AGENT_ALLOW:-*}
      # Agentic capability toggles (schema captured from the 2026.6.1 WebGUI):
      #   PLAN_TOOL → tools.experimental.planTool (experimental update_plan; multi-step
      #     work tracking). LOOP_DETECTION → tools.loopDetection.enabled (repetitive
      #     tool-call circuit breaker; autonomy safety for long agentic/sub-agent chains).
      # Both default on; off/0/false → patcher removes the key. (Footguns codeMode /
      # exec-full are intentionally NOT wired — they'd break or endanger the bot.)
      OPENCLAW_TOOLS_PLAN_TOOL: ${OPENCLAW_TOOLS_PLAN_TOOL:-on}
      OPENCLAW_TOOLS_LOOP_DETECTION: ${OPENCLAW_TOOLS_LOOP_DETECTION:-on}
      # STT provider wiring (step 14). When STT_API_TOKEN is set, the patcher
      # writes a tools.media.audio.models[] entry with provider=openai,
      # baseUrl=$OPENCLAW_STT_BASE_URL, model=$OPENCLAW_STT_MODEL, and a
      # per-entry Authorization Bearer header carrying STT_API_TOKEN (so it
      # doesn't collide with any global openai apiKey). Leave STT_API_TOKEN
      # empty to opt out — the patcher skips step 14 cleanly.
      STT_API_TOKEN: ${STT_API_TOKEN:-}
      OPENCLAW_STT_BASE_URL: ${OPENCLAW_STT_BASE_URL:-http://openclaw-stt-whisper:8080/v1}
      OPENCLAW_STT_MODEL: ${OPENCLAW_STT_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      OPENCLAW_STT_LANGUAGE: ${OPENCLAW_STT_LANGUAGE:-}
      # Discord voice-controlled agent (opt-in). The patcher does not create
      # channels.discord.* automatically yet — the schema is user-driven via
      # `openclaw channels add --channel discord --token $DISCORD_BOT_TOKEN`
      # and `openclaw agents bind` to an isolated agent. These vars are
      # plumbed so a future patcher step can reference them and so the
      # setup runbook in docs/CUSTOMIZATION.md can use `docker exec`
      # `env`-sourced commands.
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_AGENT_NAME: ${DISCORD_AGENT_NAME:-discord-voice}
      DISCORD_AUTOJOIN_GUILD_ID: ${DISCORD_AUTOJOIN_GUILD_ID:-}
      DISCORD_AUTOJOIN_VOICE_CHANNEL_ID: ${DISCORD_AUTOJOIN_VOICE_CHANNEL_ID:-}
      # Browser-automation provider wiring (step 15). When BROWSER_API_TOKEN
      # is set, the patcher writes browser.enabled=true and emits one
      # browser.profiles.<name>.cdpUrl per registered profile in
      # BROWSER_PROFILE_NAMES (default profile + named ones). Empty token
      # opts out — the patcher leaves browser.* untouched.
      BROWSER_API_TOKEN: ${BROWSER_API_TOKEN:-}
      BROWSER_PROFILE_NAMES: ${BROWSER_PROFILE_NAMES:-}
      BROWSER_CDP_HOST: ${BROWSER_CDP_HOST:-http://openclaw-browser}
      BROWSER_PORT_BASE: ${BROWSER_PORT_BASE:-9222}
      # Python sandbox MCP wiring (step 18). When PYTHON_SANDBOX_API_TOKEN
      # is set, the patcher writes mcp.servers.python_sandbox pointing at
      # the openclaw-python-sandbox service (transport: streamable-http).
      # Empty token opts out — the patcher removes the entry from
      # openclaw.json so the gateway doesn't try to dial a parked service.
      PYTHON_SANDBOX_API_TOKEN: ${PYTHON_SANDBOX_API_TOKEN:-}
      PYTHON_SANDBOX_URL: ${PYTHON_SANDBOX_URL:-http://openclaw-python-sandbox:8094/mcp}
      # Image-generation bridge MCP wiring (step 19). When IMAGE_GEN_API_TOKEN
      # is set, the patcher writes mcp.servers.comfyui_image pointing at the
      # openclaw-image-comfyui service (transport: streamable-http). The
      # bridge runs in a SEPARATE compose file
      # (openclaw-image-comfyui/docker-compose.yml) joined to this stack's
      # bridge via an external-network reference, so bridge DNS resolves
      # `openclaw-image-comfyui:9095` once both composes are up. Empty token
      # opts out — patcher removes the entry from openclaw.json.
      IMAGE_GEN_API_TOKEN: ${IMAGE_GEN_API_TOKEN:-}
      IMAGE_GEN_URL: ${IMAGE_GEN_URL:-http://openclaw-image-comfyui:9095/mcp}
      # ── Workspace docs mode (skills vs AGENTS.md blocks) ───────────────────
      # `skills` (default): tool recipes live in on-demand workspace skill
      # files; AGENTS.md keeps only policy/persona + a short router. Cuts the
      # discord bootstrap prefill by ~20 KB. `agentsmd`: legacy all-in-
      # AGENTS.md layout (rollback path if the model ignores skill bodies).
      OPENCLAW_AGENT_DOCS_MODE: ${OPENCLAW_AGENT_DOCS_MODE:-skills}
      # Thread-per-task policy block: coding / long tasks spawn into their own
      # Discord thread (sessions_spawn thread:true) instead of camping on the
      # main channel. Default on; off removes the block.
      OPENCLAW_DISCORD_AGENT_THREAD_TASKS: ${OPENCLAW_DISCORD_AGENT_THREAD_TASKS:-on}
      # ── Agentic coding: exec + approvals (patcher steps 31-33) ─────────────
      # tools.exec posture: security=allowlist + ask=on-miss + strictInlineEval
      # + safeBins + workspace-scoped applyPatch. Known-safe commands (seeded
      # by step 32) run without friction; anything unlisted becomes an approval
      # prompt on Discord (step 33). `off` removes tools.exec (upstream
      # default-deny applies again).
      OPENCLAW_TOOLS_EXEC: ${OPENCLAW_TOOLS_EXEC:-on}
      OPENCLAW_EXEC_TIMEOUT_SEC: ${OPENCLAW_EXEC_TIMEOUT_SEC:-1800}
      OPENCLAW_EXEC_SAFE_BINS: ${OPENCLAW_EXEC_SAFE_BINS:-}
      # Seed ~/.openclaw/exec-approvals.json with a developer-toolchain
      # allowlist (git/npm/node/python3/...) for the Discord-routed agent.
      # Strictly additive — learned allow-always entries are NEVER touched.
      OPENCLAW_EXEC_APPROVALS_SEED: ${OPENCLAW_EXEC_APPROVALS_SEED:-on}
      # Exec approval prompts on Discord (buttons + /approve <id> ...), routed
      # to the approvers' DMs. Approver chain: OPENCLAW_EXEC_APPROVERS →
      # OPENCLAW_DISCORD_OWNER_IDS → concrete OPENCLAW_DISCORD_COMMAND_OWNERS.
      # Never "*" — without a concrete snowflake the step skips with a warning.
      OPENCLAW_DISCORD_EXEC_APPROVALS: ${OPENCLAW_DISCORD_EXEC_APPROVALS:-on}
      OPENCLAW_EXEC_APPROVERS: ${OPENCLAW_EXEC_APPROVERS:-}
      # ── Sub-agent bounds (patcher step 5b) — KNOWN-CRASHER GATE ───────────
      # `agents.defaults.subagents` crash-looped the 2026.6.1 gateway when
      # hand-written (2026-06-08). Upstream docs now document the path; flip to
      # `on` ONLY after validating the schema on your live gateway (WebGUI
      # oracle → see docs/reference/agentic-coding.md). Anything but `on`
      # keeps the proven self-heal removal.
      OPENCLAW_SUBAGENTS_BOUNDS: ${OPENCLAW_SUBAGENTS_BOUNDS:-off}
      OPENCLAW_SUBAGENTS_MAX_SPAWN_DEPTH: ${OPENCLAW_SUBAGENTS_MAX_SPAWN_DEPTH:-}
      OPENCLAW_SUBAGENTS_MAX_CHILDREN: ${OPENCLAW_SUBAGENTS_MAX_CHILDREN:-}
      OPENCLAW_SUBAGENTS_MAX_CONCURRENT: ${OPENCLAW_SUBAGENTS_MAX_CONCURRENT:-}
      OPENCLAW_SUBAGENTS_RUN_TIMEOUT_SECONDS: ${OPENCLAW_SUBAGENTS_RUN_TIMEOUT_SECONDS:-}
      OPENCLAW_SUBAGENTS_ANNOUNCE_TIMEOUT_MS: ${OPENCLAW_SUBAGENTS_ANNOUNCE_TIMEOUT_MS:-}
      OPENCLAW_SUBAGENTS_ARCHIVE_AFTER_MINUTES: ${OPENCLAW_SUBAGENTS_ARCHIVE_AFTER_MINUTES:-}
      OPENCLAW_SUBAGENTS_DELEGATION_MODE: ${OPENCLAW_SUBAGENTS_DELEGATION_MODE:-}
      # ── Long-run hardening (patcher steps 8h/8i/8j) ────────────────────────
      # Loop-detection threshold relax for long builds (repeated `npm run
      # build` is legitimate, not a loop). Empty = upstream defaults.
      OPENCLAW_TOOLS_LOOP_DETECTION_HISTORY_SIZE: ${OPENCLAW_TOOLS_LOOP_DETECTION_HISTORY_SIZE:-}
      OPENCLAW_TOOLS_LOOP_DETECTION_WARNING_THRESHOLD: ${OPENCLAW_TOOLS_LOOP_DETECTION_WARNING_THRESHOLD:-}
      OPENCLAW_TOOLS_LOOP_DETECTION_CRITICAL_THRESHOLD: ${OPENCLAW_TOOLS_LOOP_DETECTION_CRITICAL_THRESHOLD:-}
      # agents.defaults.timeoutSeconds / contextTokens / contextPruning —
      # agents.defaults family (two crash-loop precedents): empty = skip,
      # value = write, off = self-heal removal. Validate via the WebGUI
      # oracle before first enable. Suggested: TIMEOUT=1800 (match
      # LLM_REQUEST_TIMEOUT_SECONDS), CONTEXT_TOKENS=$LLM_CONTEXT_WINDOW,
      # PRUNING_MODE=cache-ttl for multi-hour tool-heavy coding runs.
      OPENCLAW_AGENT_TIMEOUT_SECONDS: ${OPENCLAW_AGENT_TIMEOUT_SECONDS:-}
      OPENCLAW_AGENT_CONTEXT_TOKENS: ${OPENCLAW_AGENT_CONTEXT_TOKENS:-}
      OPENCLAW_AGENT_CONTEXT_PRUNING_MODE: ${OPENCLAW_AGENT_CONTEXT_PRUNING_MODE:-}
      OPENCLAW_AGENT_CONTEXT_PRUNING_TTL: ${OPENCLAW_AGENT_CONTEXT_PRUNING_TTL:-}
      # ── Thread-bound task sessions (patcher steps 29c/29d) ────────────────
      # Lifetime tuning for Discord thread bindings (empty = upstream
      # defaults: idle 24h, max-age disabled). Suggested for thread-per-task
      # coding: IDLE_HOURS=48, MAX_AGE_HOURS=336.
      OPENCLAW_DISCORD_THREAD_IDLE_HOURS: ${OPENCLAW_DISCORD_THREAD_IDLE_HOURS:-}
      OPENCLAW_DISCORD_THREAD_MAX_AGE_HOURS: ${OPENCLAW_DISCORD_THREAD_MAX_AGE_HOURS:-}
      # session.threadBindings spawn knobs — unverified schema on 2026.6.1,
      # gated off; `on` writes spawnSessions=true + defaultSpawnContext.
      OPENCLAW_SESSION_THREAD_SPAWN: ${OPENCLAW_SESSION_THREAD_SPAWN:-}
      OPENCLAW_SESSION_THREAD_SPAWN_CONTEXT: ${OPENCLAW_SESSION_THREAD_SPAWN_CONTEXT:-isolated}
      # ── Workboard plugin (patcher step 34) — tri-state ─────────────────────
      # `on` enables /workboard create|list|show|dispatch (card-based long-task
      # tracking); explicit `off` scrubs; empty = no-op. Flip to `on` after the
      # schema-gate run (docs/reference/agentic-coding.md).
      OPENCLAW_WORKBOARD: ${OPENCLAW_WORKBOARD:-}
      # ── Bot polish (patcher steps 35-39) ───────────────────────────────────
      # Emoji status lifecycle on the inbound message (queued→thinking→tool→
      # done/error). Different pipeline from ackReactionScope (#46024 — that
      # stays off); kill switch here if reaction-cycling ever reappears.
      OPENCLAW_STATUS_REACTIONS: ${OPENCLAW_STATUS_REACTIONS:-on}
      OPENCLAW_STATUS_REACTIONS_EMOJIS: ${OPENCLAW_STATUS_REACTIONS_EMOJIS:-}
      # Presence mirrors runtime health (healthy/degraded/exhausted texts).
      OPENCLAW_DISCORD_AUTO_PRESENCE: ${OPENCLAW_DISCORD_AUTO_PRESENCE:-on}
      OPENCLAW_DISCORD_AUTO_PRESENCE_HEALTHY_TEXT: ${OPENCLAW_DISCORD_AUTO_PRESENCE_HEALTHY_TEXT:-}
      OPENCLAW_DISCORD_AUTO_PRESENCE_DEGRADED_TEXT: ${OPENCLAW_DISCORD_AUTO_PRESENCE_DEGRADED_TEXT:-}
      OPENCLAW_DISCORD_AUTO_PRESENCE_EXHAUSTED_TEXT: ${OPENCLAW_DISCORD_AUTO_PRESENCE_EXHAUSTED_TEXT:-}
      # Native reply threading: the first message of a run replies to the
      # triggering message (multi-user guild channels: which answer belongs
      # to which question). Enum: off | first | all | batched.
      OPENCLAW_DISCORD_REPLY_TO_MODE: ${OPENCLAW_DISCORD_REPLY_TO_MODE:-first}
      # Short-lived follow-up memory — the bot notices promised work /
      # check-in opportunities and resurfaces them via heartbeat.
      OPENCLAW_COMMITMENTS: ${OPENCLAW_COMMITMENTS:-on}
      OPENCLAW_COMMITMENTS_MAX_PER_DAY: ${OPENCLAW_COMMITMENTS_MAX_PER_DAY:-3}
      # Mid-run steering: follow-up messages inject at the next model boundary
      # instead of waiting for the run to end. Enum: steer | followup |
      # collect | interrupt. (Upstream docs are self-contradictory on the
      # default, so we pin it.)
      OPENCLAW_MESSAGES_QUEUE_MODE: ${OPENCLAW_MESSAGES_QUEUE_MODE:-steer}
      # Dreaming deep-phase promotion cap (tokens per snippet promoted into
      # MEMORY.md — which is injected into EVERY session). Default 80 halves
      # the upstream 160 to slow MEMORY.md growth.
      OPENCLAW_DREAMING_MAX_PROMOTED_SNIPPET_TOKENS: ${OPENCLAW_DREAMING_MAX_PROMOTED_SNIPPET_TOKENS:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      # Workspace mount — patcher step 16 writes a soft policy block into
      # AGENTS.md (browser-profile use guidance). Same path the gateway
      # mounts the workspace at, so the markdown lands where the agent
      # reads it.
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ./patch-config.mjs:/opt/patch-config.mjs:ro
    entrypoint: ["node", "/opt/patch-config.mjs"]

  ######################
  ## OpenClaw Gateway — TypeScript app, Web UI + WebSocket RPC (port 18789)
  #
  #  Backend for the Chrome UI (app.openclaw.ai, or self-hosted behind a
  #  reverse proxy at e.g. https://claw.your-domain.com) and the `openclaw`
  #  CLI. Speaks to the Gemma 4 model via the OpenAI-compat API served by
  #  vllm-llm.
  ######################
  openclaw-gateway:
    # Reuses the openclaw-base-ext image built above (config-init service
    # owns the build context). If you bumped OPENCLAW_IMAGE_REF in .env to
    # pull a newer upstream openclaw release, run
    # `docker compose build --no-cache openclaw-config-init` to rebuild
    # the local extension on top of the new base — gateway and cli pick
    # up the new tag automatically on the next `up -d --force-recreate`.
    image: openclaw-base-ext:${OPENCLAW_BASE_EXT_VERSION:-0.11.1}
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-gateway
    # Explicit public DNS — the Docker daemon's default 127.0.0.11 forwarder
    # works for `curl` but the Node.js DNS-resolver retry strategy used by
    # `npm install` (during plugin install via `openclaw plugins install`)
    # hits EAI_AGAIN on it (verified 2026-06-07 during 2026.6.1 upgrade
    # attempt — the gateway curl reached registry.npmjs.org with HTTP 200
    # while npm errored EAI_AGAIN on the same hostname). Forcing 8.8.8.8 /
    # 1.1.1.1 on the gateway container also fixes openclaw-cli which shares
    # this network namespace via network_mode: service:openclaw-gateway.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_GATEWAY_CONTROL_PORT:-18790}:18790"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENAI_API_KEY: ${VLLM_API_KEY:-}
      # Default targets the in-compose vllm-llm. Override OPENAI_BASE_URL in
      # .env to point at a remote vLLM (DGX over LAN, vLLM on a separate box)
      # or a cloud OpenAI-compatible endpoint (Bedrock proxy, OpenRouter, ...).
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://vllm-llm:8004/v1}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      NODE_COMPILE_CACHE: /home/node/.openclaw/.node-compile-cache
      OPENCLAW_NO_RESPAWN: "1"
      # Bridge auth token, exposed inside the gateway container so the
      # operator-only `!~/.openclaw/bin/img` bash command (Gemma-bypass
      # for adult image generation) can hit the bridge MCP without the
      # secret being committed in the workspace script. The bash command
      # is gated by `commands.ownerAllowFrom` (operator's Discord user
      # id only) on a private single-user deploy.
      IMAGE_GEN_API_TOKEN: ${IMAGE_GEN_API_TOKEN:-}
      # MCP request-timeout ceiling. Upstream @modelcontextprotocol/sdk
      # hardcodes a 60 s default for client.request() and OpenClaw's
      # runtime calls callTool without a per-server override, so any
      # tool taking longer than 60 s surfaces a spurious MCP timeout
      # error to the agent (LTX cold-cache ~130 s, FLUX cold ~90 s,
      # 4K video renders can run minutes). The openclaw-base-ext
      # Dockerfile sed-patches the SDK constant so it reads this env;
      # default 30 minutes. Bump for routine 4K / long-form video.
      MCP_REQUEST_TIMEOUT_MS: ${MCP_REQUEST_TIMEOUT_MS:-1800000}
      TZ: ${TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    command: ["node", "dist/index.js", "gateway", "--bind", "${OPENCLAW_GATEWAY_BIND:-lan}", "--port", "18789"]
    init: true
    restart: unless-stopped
    depends_on:
      openclaw-config-init:
        condition: service_completed_successfully
      vllm-llm:
        condition: service_healthy
      vllm-embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ######################
  ## OpenClaw CLI — always-up container, reached via `docker exec openclaw-cli ...`
  #
  #  Shares the gateway's network namespace (network_mode: service:openclaw-gateway),
  #  so the CLI can reach the gateway on 127.0.0.1:18789 and the vLLM services on
  #  their compose DNS names (vllm-llm, vllm-embedding) with zero extra config.
  ######################
  openclaw-cli:
    # Same as openclaw-gateway above — reuses the openclaw-base-ext image
    # built by config-init, no separate build context here.
    image: openclaw-base-ext:${OPENCLAW_BASE_EXT_VERSION:-0.11.1}
    container_name: ${CONTAINER_NAME_PREFIX:-}openclaw-cli
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # NOTE: OPENCLAW_GATEWAY_TOKEN is intentionally NOT set on the CLI.
      # The CLI prefers the env token over `gateway.remote.token` when both
      # are present, so passing a stale .env value (rotated by bootstrap.sh
      # before the onboarding wizard ran) caused the CLI's WS connect to
      # fail with `unauthorized: gateway token mismatch` — the wizard had
      # written a different token into config.gateway.auth.token (also used
      # by the Chrome extension and any remote client). Leaving this var
      # unset makes the CLI fall through to the config token, which step 12
      # of patch-config.mjs keeps in lockstep with auth.token.
      # When the CLI's WS connect to the gateway fails (e.g. gateway.remote.token
      # drift), `openclaw agent` silently falls back to an embedded runner that
      # dials vLLM directly. The embedded path reads OPENAI_API_KEY from the
      # container env — without this line it was unset, producing HTTP 401
      # against an `--api-key`-protected vLLM. Mirror the gateway's wiring.
      OPENAI_API_KEY: ${VLLM_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://vllm-llm:8004/v1}
      BROWSER: echo
      NODE_COMPILE_CACHE: /home/node/.openclaw/.node-compile-cache
      OPENCLAW_NO_RESPAWN: "1"
      # Mirror gateway's MCP request-timeout override so
      # `docker exec openclaw-cli openclaw agent ...` calls pick up
      # the same long-call tolerance. See gateway service comment.
      MCP_REQUEST_TIMEOUT_MS: ${MCP_REQUEST_TIMEOUT_MS:-1800000}
      TZ: ${TZ:-UTC}
      # Plumbed so the Discord-voice setup runbook can reference them inside
      # the CLI container without re-entering the bot token. Empty by default
      # — `openclaw channels add --channel discord --token "$DISCORD_BOT_TOKEN"`
      # becomes a no-op when unset (the user hasn't opted in yet).
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_AGENT_NAME: ${DISCORD_AGENT_NAME:-discord-voice}
      DISCORD_AUTOJOIN_GUILD_ID: ${DISCORD_AUTOJOIN_GUILD_ID:-}
      DISCORD_AUTOJOIN_VOICE_CHANNEL_ID: ${DISCORD_AUTOJOIN_VOICE_CHANNEL_ID:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    # Compose's `entrypoint:` overrides the Dockerfile ENTRYPOINT, so we
    # chain through /opt/patch-mcp-timeout.sh explicitly here — otherwise
    # the CLI's embedded-runner MCP path keeps the unpatched 60s SDK
    # timeout. The script exec's "$@" after patching, so the sleep
    # behaviour is preserved.
    entrypoint: ["/opt/patch-mcp-timeout.sh", "/bin/sh", "-c", "exec sleep infinity"]
    depends_on:
      - openclaw-gateway
